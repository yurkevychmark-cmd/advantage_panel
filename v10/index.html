    const fmt = (n) => {
      if (n == null || isNaN(n)) return "$0.00";
      const abs = Math.abs(n);
      const s = abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return n < 0 ? `-$${s}` : `$${s}`;
    };
    
    const parseNum = (v) => {
      if (v === "" || v == null) return 0;
      const s = String(v).replace(/[^0-9.,-]/g, "").replace(",", ".");
      return parseFloat(s) || 0;
    };
    
    const uid = () => Math.random().toString(36).slice(2, 9);

    const incrementDate = (dateStr) => {
      if (!dateStr || !dateStr.includes('.')) return dateStr;
      const parts = dateStr.split('.');
      let day = parseInt(parts[0]) || 1;
      let month = parseInt(parts[1]) || 1;
      month += 1;
      if (month > 12) { month = 1; }
      return String(day).padStart(2, '0') + '.' + String(month).padStart(2, '0');
    };

    const arrayMove = (arr, from, to) => {
      const next = [...arr];
      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);
      return next;
    };

    const DragHandle = () => (
      <span style={{ cursor: 'grab', color: '#bbb', fontSize: 11, userSelect: 'none', padding: '0 2px', display: 'inline-block', lineHeight: 1 }} title="Drag to reorder">⋮⋮</span>
    );

    const makeWorkerPay = (workers) => {
      const o = {};
      workers.forEach((w) => { o[w.id] = { amount: 0, paid: false, comment: "", advance: 0 }; });
      return o;
    };

    const resolveAccount = (raw) => {
      if (!raw) return "";
      if (raw.includes(">")) return raw.split(">").pop().trim();
      return raw.trim();
    };

    const EditableCell = ({ value, onChange, type = "text", className = "", style = {}, mono = false, isDate = false, activeMonthIdx = 0, multiline = false }) => {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value === 0 && type === "number" ? "" : String(value ?? ""));
      const inputRef = useRef(null);
      
      useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);
      useEffect(() => { if (!editing) setDraft(value === 0 && type === "number" ? "" : String(value ?? "")); }, [value, editing, type]);
      
      const commit = () => { 
        let finalVal = draft;
        if (isDate && /^\d{1,2}$/.test(finalVal.trim())) {
          finalVal = `${finalVal.trim().padStart(2, '0')}.${String(activeMonthIdx + 1).padStart(2, '0')}`;
        }
        onChange(type === "number" ? parseNum(finalVal) : finalVal); 
        setEditing(false); 
      };
      
      const cancel = () => { setDraft(value === 0 && type === "number" ? "" : String(value ?? "")); setEditing(false); };
      
      if (editing) {
        if (multiline) {
           return <textarea ref={inputRef} value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Escape") cancel(); }} onBlur={commit} style={{ width: "100%", boxSizing: "border-box", padding: "4px 6px", border: "2px solid #4A90D9", borderRadius: 3, fontFamily: "'DM Sans',sans-serif", fontSize: 11, outline: "none", background: "#fff", resize: "vertical", minHeight: 50, ...style }} className={className} />
        }
        return (<input ref={inputRef} value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") cancel(); }} onBlur={commit} style={{ width: "100%", boxSizing: "border-box", padding: "4px 6px", border: "2px solid #4A90D9", borderRadius: 3, fontFamily: mono ? "'JetBrains Mono',monospace" : "'DM Sans',sans-serif", fontSize: 13, outline: "none", background: "#fff", ...style }} className={className} />);
      }
      return (<div onClick={() => setEditing(true)} style={{ cursor: "text", padding: "4px 6px", minHeight: 22, borderRadius: 3, fontFamily: mono ? "'JetBrains Mono',monospace" : "'DM Sans',sans-serif", fontSize: 13, transition: "background .15s", ...style }} className={`editable-cell ${className}`} title={type !== "number" ? value : undefined}>{type === "number" ? fmt(value) : (value || "")}</div>);
    };

    const CommentCell = ({ value, onChange }) => {
      const [expanded, setExpanded] = useState(false);
      const handleToggle = (e) => { e.stopPropagation(); setExpanded(!expanded); };
      
      if (!value) return <span className="comment-icon" onClick={() => onChange("...")} style={{ padding: "0 6px", display: "inline-block" }}>💬</span>;
      
      return (
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 4 }}>
          <div style={{ maxWidth: 140, overflow: expanded ? 'visible' : 'hidden', textOverflow: expanded ? 'clip' : 'ellipsis', whiteSpace: expanded ? 'pre-wrap' : 'nowrap' }}>
            <EditableCell value={value} onChange={onChange} multiline={true} style={{ fontSize: 10, color: "#888", padding: "0 2px", width: "100%" }} />
          </div>
          {value.length > 15 && (
            <button onClick={handleToggle} style={{ background: 'none', border: 'none', color: '#4A90D9', cursor: 'pointer', fontSize: 14, padding: 0, lineHeight: 1 }}>
              {expanded ? '▴' : '▾'}
            </button>
          )}
        </div>
      );
    };

    const CurrencyConverter = () => {
      const [rates, setRates] = useState(null);
      const [loading, setLoading] = useState(true);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [amount, setAmount] = useState('1');
      const [fromCur, setFromCur] = useState('EUR');
      const [toCur, setToCur] = useState('USD');

      const fetchRates = async () => {
        setLoading(true);
        let eurToUsd = 1, eurToPln = 1;
        let usdtRate = 1, usdcRate = 1;
        // Fiat rates — try open.er-api.com first, frankfurter.app as fallback
        try {
          const fxRes = await fetch('https://open.er-api.com/v6/latest/EUR');
          if (fxRes.ok) {
            const fxData = await fxRes.json();
            if (fxData.result === 'success' && fxData.rates?.USD) {
              eurToUsd = fxData.rates.USD;
              eurToPln = fxData.rates.PLN || 1;
            }
          }
        } catch(e) { console.error('open.er-api error', e); }
        if (eurToUsd === 1) {
          try {
            const fxRes2 = await fetch('https://api.frankfurter.app/latest?from=EUR');
            if (fxRes2.ok) {
              const fxData2 = await fxRes2.json();
              eurToUsd = fxData2.rates?.USD || 1;
              eurToPln = fxData2.rates?.PLN || 1;
            }
          } catch(e) { console.error('frankfurter error', e); }
        }
        // Crypto rates from CoinGecko (optional, fallback to 1)
        try {
          const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,usd-coin&vs_currencies=usd');
          if (cryptoRes.ok) {
            const cryptoData = await cryptoRes.json();
            usdtRate = cryptoData?.tether?.usd || 1;
            usdcRate = cryptoData?.['usd-coin']?.usd || 1;
          }
        } catch(e) { console.error('Crypto rates error', e); }
        setRates({
          USD: 1,
          EUR: eurToUsd,
          PLN: eurToUsd / eurToPln,
          USDT: usdtRate,
          USDC: usdcRate,
        });
        setLastUpdate(new Date());
        setLoading(false);
      };

      useEffect(() => {
        fetchRates();
        const iv = setInterval(fetchRates, 5 * 60 * 1000);
        return () => clearInterval(iv);
      }, []);

      const result = useMemo(() => {
        if (!rates || !amount || isNaN(parseFloat(amount))) return null;
        return parseFloat(amount) * (rates[fromCur] || 1) / (rates[toCur] || 1);
      }, [rates, amount, fromCur, toCur]);

      const currencies = ['USD', 'EUR', 'PLN', 'USDT', 'USDC'];
      const selSt = { padding: '6px 8px', background: '#333', border: '1px solid rgba(255,255,255,.15)', borderRadius: 6, color: '#fff', fontSize: 12, fontFamily: "'DM Sans',sans-serif", outline: 'none', cursor: 'pointer' };

      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'rgba(255,255,255,.04)', borderRadius: 8, padding: '8px 16px', border: '1px solid rgba(255,255,255,.07)', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginRight: 8 }}>
            {[['EUR/USD', rates?.EUR, '#FBBF24'], ['EUR/PLN', rates ? rates.EUR / rates.PLN : null, '#60A5FA'], ['USDT/USDC', rates ? rates.USDT / rates.USDC : null, '#4ADE80']].map(([lbl, val, clr]) => (
              <div key={lbl} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <span style={{ color: 'rgba(255,255,255,.35)', fontSize: 8, textTransform: 'uppercase', letterSpacing: .5 }}>{lbl}</span>
                <span style={{ color: clr, fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, fontSize: 11 }}>{val != null ? val.toFixed(4) : '—'}</span>
              </div>
            ))}
            <button onClick={fetchRates} title="Оновити" style={{ background: 'none', border: 'none', color: loading ? '#4A90D9' : 'rgba(255,255,255,.3)', cursor: 'pointer', fontSize: 12, padding: 0, lineHeight: 1 }}>↻</button>
            {lastUpdate && <span style={{ color: 'rgba(255,255,255,.2)', fontSize: 9 }}>{lastUpdate.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'})}</span>}
          </div>
          <div style={{ width: 1, height: 28, background: 'rgba(255,255,255,.1)' }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ color: 'rgba(255,255,255,.4)', fontSize: 10, textTransform: 'uppercase', letterSpacing: .5 }}>Конвертер:</span>
            <input type="number" value={amount} onChange={e => setAmount(e.target.value)} style={{ width: 80, padding: '6px 8px', background: 'rgba(255,255,255,.08)', border: '1px solid rgba(255,255,255,.15)', borderRadius: 6, color: '#fff', fontSize: 13, fontFamily: "'JetBrains Mono',monospace", outline: 'none' }} placeholder="Сума" />
            <select value={fromCur} onChange={e => setFromCur(e.target.value)} style={selSt}>{currencies.map(c => <option key={c} value={c}>{c}</option>)}</select>
            <button onClick={() => { const t = fromCur; setFromCur(toCur); setToCur(t); }} style={{ background: 'rgba(255,255,255,.06)', border: '1px solid rgba(255,255,255,.1)', borderRadius: 6, color: 'rgba(255,255,255,.6)', cursor: 'pointer', fontSize: 13, padding: '4px 8px' }}>⇄</button>
            <div style={{ minWidth: 90, padding: '6px 10px', background: 'rgba(255,255,255,.04)', border: '1px solid rgba(255,255,255,.08)', borderRadius: 6, fontFamily: "'JetBrains Mono',monospace", fontSize: 14, fontWeight: 700, color: result != null ? '#4ADE80' : 'rgba(255,255,255,.2)', textAlign: 'center' }}>
              {result != null ? result.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 4}) : '—'}
            </div>
            <select value={toCur} onChange={e => setToCur(e.target.value)} style={selSt}>{currencies.map(c => <option key={c} value={c}>{c}</option>)}</select>
          </div>
        </div>
      );
    };

    const LoginScreen = () => {
      const [email, setEmail] = useState("");
      const [pass, setPass] = useState("");
      const [error, setError] = useState("");
      const [shake, setShake] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      
      const handleSubmit = async () => {
        setIsLoading(true);
        setError("");
        
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email.trim(),
          password: pass,
        });

        if (error) {
          setError("Невірний email або пароль");
          setShake(true);
          setTimeout(() => setShake(false), 500);
        }
        setIsLoading(false);
      };
      
      return (
        <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans',sans-serif" }}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
            @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}.login-shake{animation:shake .4s ease}`}</style>
          <div className={shake ? "login-shake" : ""} style={{ background: "#fff", borderRadius: 16, padding: "48px 40px", width: 400, maxWidth: "90vw", boxShadow: "0 24px 80px rgba(0,0,0,.5)" }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <img src={LOGO_SRC} alt="ADvantage" style={{ height: 36 }} />
              <div style={{ fontSize: 14, color: "#888", marginTop: 8 }}>Revenue Panel</div>
            </div>
            <label style={{ display: "block", marginBottom: 16 }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: "#555", display: "block", marginBottom: 4 }}>Email</span>
              <input type="email" value={email} onChange={(e) => { setEmail(e.target.value); setError(""); }} placeholder="your@email.com" style={{ width: "100%", padding: "10px 14px", border: "1.5px solid #ddd", borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans',sans-serif", boxSizing: "border-box", outline: "none" }} autoFocus />
            </label>
            <label style={{ display: "block", marginBottom: 20 }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: "#555", display: "block", marginBottom: 4 }}>Пароль</span>
              <input type="password" value={pass} onChange={(e) => { setPass(e.target.value); setError(""); }} placeholder="••••••••••" onKeyDown={(e) => { if (e.key === "Enter") handleSubmit(); }} style={{ width: "100%", padding: "10px 14px", border: "1.5px solid #ddd", borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans',sans-serif", boxSizing: "border-box", outline: "none" }} />
            </label>
            {error && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 12, textAlign: "center" }}>{error}</div>}
            <button onClick={handleSubmit} disabled={isLoading} style={{ width: "100%", padding: "12px", background: "#1A1A1A", color: "#fff", border: "none", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: isLoading ? "wait" : "pointer", fontFamily: "'DM Sans',sans-serif", opacity: isLoading ? 0.7 : 1 }}>
               {isLoading ? "Вхід..." : "Увійти"}
            </button>
          </div>
        </div>
      );
    };

    const Dashboard = ({ userEmail, onLogout }) => {
      const [isInitialLoad, setIsInitialLoad] = useState(true);
      const [currentMonth, setCurrentMonth] = useState(2);
      const [currentYear, setCurrentYear] = useState(2026);
      
      const [workers, setWorkers] = useState([]);
      const [accounts, setAccounts] = useState([]);
      const [products, setProducts] = useState([]);
      const [showAddProduct, setShowAddProduct] = useState(false);
      const [newProduct, setNewProduct] = useState({ name: "", color: "#4A90D9", avgPrice: 0 });
      const [editProduct, setEditProduct] = useState(null);
      const [monthData, setMonthData] = useState({});
      
      const [showAddWorker, setShowAddWorker] = useState(false);
      const [showAddExpense, setShowAddExpense] = useState(false);
      const [showAddAccount, setShowAddAccount] = useState(false);
      const [showTransfer, setShowTransfer] = useState(false);
      const [showAddInvestment, setShowAddInvestment] = useState(false);
      const [newInvestment, setNewInvestment] = useState({ person: "", amount: 0, method: "USD", date: "", comment: "" });
      const [editExpense, setEditExpense] = useState(null);
      const [editAccount, setEditAccount] = useState(null);
      
      const [newWorker, setNewWorker] = useState({ name: "", role: "", colorIdx: 5 });
      const [newExpense, setNewExpense] = useState({ service: "", persona: "", method: "USDT", date: "", cost: 0 });
      const [newAccountForm, setNewAccountForm] = useState({ name: "", owner: "", limit: 10000 });
      const [newTransfer, setNewTransfer] = useState({ fromAcc: "", toAcc: "", amount: 0, fee: 0, date: "" });
      
      const [expandedAcct, setExpandedAcct] = useState(null);
      
      const [selectedTx, setSelectedTx] = useState(new Set());
      const [selectedExp, setSelectedExp] = useState(new Set());
      const [dragTxIdx, setDragTxIdx] = useState(null);
      const [dragExpIdx, setDragExpIdx] = useState(null);
      const [dragAccIdx, setDragAccIdx] = useState(null);
      const [dragWorkerIdx, setDragWorkerIdx] = useState(null);

      const [bulkTargetMonth, setBulkTargetMonth] = useState(`${currentMonth === 11 ? currentYear + 1 : currentYear}-${currentMonth === 11 ? 0 : currentMonth + 1}`);
      
      const historyRef = useRef([]);
      const MAX_HISTORY = 30;

      useEffect(() => {
        async function fetchData() {
          const { data: settings } = await supabase.from('global_settings').select('*').eq('id', 1).single();
          if (settings) {
            if (settings.workers && settings.workers.length > 0) setWorkers(settings.workers);
            if (settings.accounts && settings.accounts.length > 0) setAccounts(settings.accounts);
            if (settings.products && settings.products.length > 0) setProducts(settings.products);
          }

          const { data: months } = await supabase.from('monthly_data').select('*');
          if (months && months.length > 0) {
            const md = {};
            months.forEach(m => { md[m.month_key] = m.data; });
            setMonthData(md);
          } else {
             setMonthData({ "2026-2": { transactions: [], expenses: [], transfers: [], carryover: 0 } });
          }
          setIsInitialLoad(false);
        }
        fetchData();
      }, []);

      useEffect(() => {
        if (isInitialLoad) return;
        const timer = setTimeout(async () => {
          await supabase.from('global_settings').upsert({ id: 1, workers, accounts, products });
          
          const updates = Object.keys(monthData).map(key => ({ month_key: key, data: monthData[key] }));
          if (updates.length > 0) {
             await supabase.from('monthly_data').upsert(updates);
          }
        }, 1500); 
        return () => clearTimeout(timer);
      }, [workers, accounts, products, monthData, isInitialLoad]);

      const pushHistory = useCallback(() => {
        historyRef.current = [...historyRef.current.slice(-(MAX_HISTORY - 1)), JSON.parse(JSON.stringify(monthData))];
      }, [monthData]);

      const undo = useCallback(() => {
        if (historyRef.current.length === 0) return;
        const prev = historyRef.current.pop();
        setMonthData(prev);
      }, []);

      const monthKey = `${currentYear}-${currentMonth}`;
      const data = monthData[monthKey] || { transactions: [], expenses: [], transfers: [], investments: [], carryover: 0 };
      const transactions = data.transactions || [];
      const expenses = data.expenses || [];
      const transfers = data.transfers || [];
      const investments = data.investments || [];
      const carryover = data.carryover || 0;

      const setTransactions = (txs) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, transactions: typeof txs === "function" ? txs(data.transactions || []) : txs } })); };
      const setExpenses = (exps) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, expenses: typeof exps === "function" ? exps(data.expenses || []) : exps } })); };
      const setTransfers = (trfs) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, transfers: typeof trfs === "function" ? trfs(data.transfers || []) : trfs } })); };
      const setInvestments = (invs) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, investments: typeof invs === "function" ? invs(data.investments || []) : invs } })); };

      const totalPayment = useMemo(() => transactions.reduce((s, t) => s + parseNum(t.payment), 0), [transactions]);
      const totalRev = useMemo(() => transactions.reduce((s, t) => s + parseNum(t.agencyRev), 0), [transactions]);
      const totalCosts = useMemo(() => transactions.reduce((s, t) => s + parseNum(t.costTax), 0), [transactions]);
      const totalExpenses = useMemo(() => expenses.reduce((s, e) => s + parseNum(e.cost), 0), [expenses]);
      const agencyBudget = totalRev - totalExpenses + carryover;

      // Balance of personal accounts (all months): received (transactions) − spent (expenses)
      // Excludes agency accounts AND worker names (they are not personal founder accounts)
      const personalAccountStats = useMemo(() => {
        const agencyNames = new Set(accounts.map(a => a.name.toLowerCase().trim()));
        const workerNames = new Set(workers.map(w => w.name.toLowerCase().trim()));
        const excluded = new Set([...agencyNames, ...workerNames]);
        const stats = {};
        Object.values(monthData).forEach(md => {
          (md.transactions || []).forEach(tx => {
            const acc = resolveAccount(tx.platforma)?.trim();
            if (acc && !excluded.has(acc.toLowerCase())) {
              if (!stats[acc]) stats[acc] = { received: 0, spent: 0 };
              stats[acc].received += parseNum(tx.payment);
            }
          });
          (md.expenses || []).forEach(ex => {
            const acc = ex.persona?.trim();
            if (acc && !excluded.has(acc.toLowerCase())) {
              if (!stats[acc]) stats[acc] = { received: 0, spent: 0 };
              stats[acc].spent += parseNum(ex.cost);
            }
          });
        });
        return stats;
      }, [accounts, workers, monthData]);

      // Expenses paid from personal (non-agency, non-worker) accounts → auto-show in investments
      const personalExpInvestments = useMemo(() => {
        const agencyNames = new Set(accounts.map(a => a.name.toLowerCase().trim()));
        const workerNames = new Set(workers.map(w => w.name.toLowerCase().trim()));
        const excluded = new Set([...agencyNames, ...workerNames]);
        return expenses
          .filter(ex => ex.persona && ex.persona.trim() && !excluded.has(ex.persona.toLowerCase().trim()))
          .map(ex => ({
            id: 'auto_' + ex.id,
            person: ex.persona,
            amount: ex.cost,
            method: ex.method || 'USD',
            date: ex.date,
            comment: ex.service,
            auto: true,
          }));
      }, [expenses, accounts, workers]);

      // Product sales stats computed across all months
      const productStats = useMemo(() => {
        return products.map(p => {
          let totalSales = 0, monthSales = 0;
          Object.entries(monthData).forEach(([key, md]) => {
            const cnt = (md.transactions || []).filter(t => t.service && t.service.toLowerCase() === p.name.toLowerCase()).length;
            totalSales += cnt;
            if (key === monthKey) monthSales = cnt;
          });
          return { ...p, totalSales, monthSales };
        });
      }, [products, monthData, monthKey]);

      const addProduct = () => {
        if (!newProduct.name.trim()) return;
        if (editProduct) {
          setProducts(p => p.map(pr => pr.id === editProduct.id ? { ...pr, ...newProduct } : pr));
          setEditProduct(null);
        } else {
          setProducts(p => [...p, { id: uid(), ...newProduct }]);
        }
        setNewProduct({ name: "", color: "#4A90D9", avgPrice: 0 });
        setShowAddProduct(false);
      };
      const removeProduct = (id) => setProducts(p => p.filter(pr => pr.id !== id));
      const startEditProduct = (pr) => { setEditProduct(pr); setNewProduct({ name: pr.name, color: pr.color, avgPrice: pr.avgPrice }); setShowAddProduct(true); };

      const workerTotals = useMemo(() => {
        const m = {};
        workers.forEach((w) => { m[w.id] = { paid: 0, pending: 0 }; });
        transactions.forEach((t) => { workers.forEach((w) => { const wp = t.workerPay?.[w.id]; if (wp && wp.amount) { if (wp.paid) m[w.id].paid += parseNum(wp.amount); else m[w.id].pending += parseNum(wp.amount); } }); });
        return m;
      }, [transactions, workers]);

      const accountUsage = useMemo(() => {
        const allTx = []; const allExp = []; const allTransfers = [];
        Object.values(monthData).forEach(md => {
          if (md.transactions) allTx.push(...md.transactions);
          if (md.expenses) allExp.push(...md.expenses);
          if (md.transfers) allTransfers.push(...md.transfers);
        });
        
        return accounts.map(acc => {
          const txListGlobal = allTx.filter(tx => resolveAccount(tx.platforma) === acc.name);
          const expListGlobal = allExp.filter(ex => ex.persona === acc.name);
          const transfersOutGlobal = allTransfers.filter(tr => tr.fromAcc === acc.name);
          const transfersInGlobal = allTransfers.filter(tr => tr.toAcc === acc.name);
          
          const agencyRevTotal = txListGlobal.reduce((s, tx) => s + parseNum(tx.agencyRev), 0);
          const txTotal = txListGlobal.reduce((s, tx) => s + parseNum(tx.payment), 0);
          const expTotalAcc = expListGlobal.reduce((s, ex) => s + parseNum(ex.cost), 0);
          const trOutTotal = transfersOutGlobal.reduce((s, tr) => s + parseNum(tr.amount) + parseNum(tr.fee), 0);
          const trInTotal = transfersInGlobal.reduce((s, tr) => s + parseNum(tr.amount), 0);
          
          const used = txTotal + expTotalAcc + trOutTotal - trInTotal;
          const pct = acc.limit > 0 ? (used / acc.limit) * 100 : 0;
          const accountBudget = agencyRevTotal - expTotalAcc - trOutTotal + trInTotal;
          
          const txList = transactions.filter(tx => resolveAccount(tx.platforma) === acc.name);
          const expList = expenses.filter(ex => ex.persona === acc.name);
          const trOutList = transfers.filter(tr => tr.fromAcc === acc.name);
          const trInList = transfers.filter(tr => tr.toAcc === acc.name);
          
          return { ...acc, used, remaining: acc.limit - used, pct, accountBudget, txList, expList, trOutList, trInList };
        });
      }, [accounts, monthData, transactions, expenses, transfers]);

      const rowDiff = useCallback((t) => {
        const wp = workers.reduce((s, w) => s + parseNum(t.workerPay?.[w.id]?.amount), 0);
        return parseNum(t.payment) - wp - parseNum(t.costTax) - parseNum(t.agencyRev);
      }, [workers]);

      const prevMonth = () => { if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); } else setCurrentMonth(m => m - 1); };
      const nextMonth = () => { 
        const nm = currentMonth === 11 ? 0 : currentMonth + 1; 
        const ny = currentMonth === 11 ? currentYear + 1 : currentYear; 
        const nk = `${ny}-${nm}`; 
        setMonthData(p => ({ ...p, [nk]: { transactions: p[nk]?.transactions || [], expenses: p[nk]?.expenses || [], transfers: p[nk]?.transfers || [], carryover: agencyBudget } })); 
        setCurrentMonth(nm); 
        setCurrentYear(ny); 
      };

      const monthSuffix = '.' + String(currentMonth + 1).padStart(2, '0');
      const autoDate = (val) => {
        if (!val) return val;
        const clean = String(val).trim();
        if (/^\d{1,2}$/.test(clean)) return clean.padStart(2, '0') + monthSuffix;
        return clean;
      };

      const updateTx = (txId, field, val) => setTransactions(p => p.map(t => t.id === txId ? { ...t, [field]: field === 'date' ? autoDate(val) : val } : t));
      const updateWorkerPay = (txId, wId, field, val) => setTransactions(p => p.map(t => { if (t.id !== txId) return t; return { ...t, workerPay: { ...t.workerPay, [wId]: { ...t.workerPay[wId], [field]: val } } }; }));
      const addTransaction = () => setTransactions(p => [...p, { id: uid(), client: "", service: "", platforma: "", payment: 0, date: "", costTax: 0, agencyRev: 0, comment: "", invoice: null, status: 'pending', workerPay: makeWorkerPay(workers) }]);
      const removeTx = (id) => setTransactions(p => p.filter(t => t.id !== id));

      const handleBulkAction = (actionType) => {
        if (!bulkTargetMonth) return;
        const [tYear, tMonth] = bulkTargetMonth.split('-');
        const targetMonthIdx = parseInt(tMonth);
        
        const formatTransferredDate = (oldDate) => {
            if(!oldDate) return "";
            const parts = oldDate.split('.');
            if(parts.length >= 1) return `${parts[0].padStart(2, '0')}.${String(targetMonthIdx + 1).padStart(2, '0')}`;
            return oldDate;
        };

        const txsToProcess = transactions.filter(t => selectedTx.has(t.id));
        const expsToProcess = expenses.filter(e => selectedExp.has(e.id));
        
        pushHistory();
        
        setMonthData(prev => {
           const nextState = {...prev};
           if (!nextState[bulkTargetMonth]) nextState[bulkTargetMonth] = { transactions: [], expenses: [], transfers: [], carryover: 0 };
           
           const newTxs = txsToProcess.map(t => ({
             ...t, 
             id: uid(), 
             date: formatTransferredDate(t.date), 
             workerPay: Object.fromEntries(Object.entries(t.workerPay || {}).map(([k, v]) => [k, { ...v, paid: false }])) 
           }));
           
           const newExps = expsToProcess.map(e => ({
             ...e, 
             id: uid(), 
             date: formatTransferredDate(e.date) 
           }));
           
           nextState[bulkTargetMonth].transactions = [...(nextState[bulkTargetMonth].transactions || []), ...newTxs];
           nextState[bulkTargetMonth].expenses = [...(nextState[bulkTargetMonth].expenses || []), ...newExps];
           
           return nextState;
        });
        
        if (actionType === 'move') {
           setTransactions(prev => prev.filter(t => !selectedTx.has(t.id)));
           setExpenses(prev => prev.filter(e => !selectedExp.has(e.id)));
        }
        
        setSelectedTx(new Set());
        setSelectedExp(new Set());
      };

      const exportSelected = () => {
        const txToExport = selectedTx.size > 0 ? transactions.filter(t => selectedTx.has(t.id)) : transactions;
        const expToExport = selectedExp.size > 0 ? expenses.filter(e => selectedExp.has(e.id)) : expenses;
        const payload = { month: monthKey, transactions: txToExport, expenses: expToExport, transfers: transfers, exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `advantage-backup-${monthKey}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importInputRef = useRef(null);
      const handleImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = JSON.parse(reader.result);
            pushHistory();
            setMonthData(p => {
              const cur = p[monthKey] || { transactions: [], expenses: [], transfers: [], carryover: 0 };
              const updated = { ...cur };
              if (imported.transactions && Array.isArray(imported.transactions)) {
                updated.transactions = [...(cur.transactions || []), ...imported.transactions.map(t => ({ ...t, id: uid() }))];
              }
              if (imported.expenses && Array.isArray(imported.expenses)) {
                updated.expenses = [...(cur.expenses || []), ...imported.expenses.map(ex => ({ ...ex, id: uid() }))];
              }
              if (imported.transfers && Array.isArray(imported.transfers)) {
                updated.transfers = [...(cur.transfers || []), ...imported.transfers.map(tr => ({ ...tr, id: uid() }))];
              }
              return { ...p, [monthKey]: updated };
            });
          } catch (err) { alert('Invalid JSON file'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const onTxDragStart = (i) => setDragTxIdx(i);
      const onTxDragOver = (e, i) => { e.preventDefault(); };
      const onTxDrop = (i) => { if (dragTxIdx !== null && dragTxIdx !== i) setTransactions(p => arrayMove(p, dragTxIdx, i)); setDragTxIdx(null); };
      
      const onExpDragStart = (i) => setDragExpIdx(i);
      const onExpDragOver = (e, i) => { e.preventDefault(); };
      const onExpDrop = (i) => { if (dragExpIdx !== null && dragExpIdx !== i) setExpenses(p => arrayMove(p, dragExpIdx, i)); setDragExpIdx(null); };

      const onAccDragStart = (e, i) => { e.stopPropagation(); setDragAccIdx(i); };
      const onAccDragOver = (e, i) => { e.preventDefault(); e.stopPropagation(); };
      const onAccDrop = (e, i) => { e.stopPropagation(); if (dragAccIdx !== null && dragAccIdx !== i) setAccounts(p => arrayMove(p, dragAccIdx, i)); setDragAccIdx(null); };

      const onWorkerDragStart = (e, i) => { e.stopPropagation(); setDragWorkerIdx(i); };
      const onWorkerDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };
      const onWorkerDrop = (e, i) => { e.stopPropagation(); if (dragWorkerIdx !== null && dragWorkerIdx !== i) setWorkers(p => arrayMove(p, dragWorkerIdx, i)); setDragWorkerIdx(null); };

      const toggleSelectTx = (id) => setSelectedTx(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleSelectExp = (id) => setSelectedExp(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleAllTx = () => { if (selectedTx.size === transactions.length) setSelectedTx(new Set()); else setSelectedTx(new Set(transactions.map(t => t.id))); };
      const toggleAllExp = () => { if (selectedExp.size === expenses.length) setSelectedExp(new Set()); else setSelectedExp(new Set(expenses.map(e => e.id))); };

      const invoiceInputRef = useRef(null);
      const [invoiceTxId, setInvoiceTxId] = useState(null);
      const handleInvoiceUpload = (e) => { const file = e.target.files?.[0]; if (!file || !invoiceTxId) return; const r = new FileReader(); r.onload = () => { updateTx(invoiceTxId, "invoice", { name: file.name, data: r.result }); setInvoiceTxId(null); }; r.readAsDataURL(file); e.target.value = ""; };
      const triggerInvoiceUpload = (txId) => { setInvoiceTxId(txId); setTimeout(() => invoiceInputRef.current?.click(), 50); };
      const downloadInvoice = (inv) => { const a = document.createElement("a"); a.href = inv.data; a.download = inv.name; a.click(); };

      const addWorker = () => { if (!newWorker.name.trim()) return; const w = { id: uid(), name: newWorker.name.trim(), role: newWorker.role.trim(), colorIdx: newWorker.colorIdx % WORKER_COLORS.length }; setWorkers(p => [...p, w]); setMonthData(p => { const n = { ...p }; Object.keys(n).forEach(k => { n[k] = { ...n[k], transactions: (n[k].transactions || []).map(t => ({ ...t, workerPay: { ...t.workerPay, [w.id]: { amount: 0, paid: false } } })) }; }); return n; }); setNewWorker({ name: "", role: "", colorIdx: (newWorker.colorIdx + 1) % WORKER_COLORS.length }); setShowAddWorker(false); };
      const removeWorker = (wId) => { setWorkers(p => p.filter(w => w.id !== wId)); setMonthData(p => { const n = { ...p }; Object.keys(n).forEach(k => { n[k] = { ...n[k], transactions: (n[k].transactions || []).map(t => { const wp = { ...t.workerPay }; delete wp[wId]; return { ...t, workerPay: wp }; }) }; }); return n; }); };

      const addExpense = () => { if (!newExpense.service.trim()) return; const expData = { ...newExpense, date: autoDate(newExpense.date) }; if (editExpense) setExpenses(p => p.map(e => e.id === editExpense.id ? { ...editExpense, ...expData } : e)); else setExpenses(p => [...p, { id: uid(), ...expData }]); setNewExpense({ service: "", persona: "", method: "USDT", date: "", cost: 0 }); setShowAddExpense(false); setEditExpense(null); };
      const removeExpense = (id) => setExpenses(p => p.filter(e => e.id !== id));
      const startEditExpense = (e) => { setEditExpense(e); setNewExpense({ service: e.service, persona: e.persona, method: e.method, date: e.date, cost: e.cost }); setShowAddExpense(true); };

      const addTransfer = () => { if (!newTransfer.fromAcc || !newTransfer.toAcc) return; setTransfers(p => [...p, { id: uid(), ...newTransfer, date: autoDate(newTransfer.date) }]); setNewTransfer({ fromAcc: "", toAcc: "", amount: 0, fee: 0, date: "" }); setShowTransfer(false); };
      const removeTransfer = (id) => setTransfers(p => p.filter(t => t.id !== id));

      const addInvestment = () => { if (!newInvestment.person.trim() || !newInvestment.amount) return; setInvestments(p => [...p, { id: uid(), ...newInvestment, date: autoDate(newInvestment.date) }]); setNewInvestment({ person: "", amount: 0, method: "USD", date: "", comment: "" }); setShowAddInvestment(false); };
      const removeInvestment = (id) => setInvestments(p => p.filter(i => i.id !== id));

      const submitAccountForm = () => { 
        if (!newAccountForm.name.trim()) return; 
        if (editAccount) {
          setAccounts(p => p.map(a => a.id === editAccount.id ? { ...a, name: newAccountForm.name.trim(), owner: newAccountForm.owner.trim(), limit: parseNum(newAccountForm.limit) } : a));

            select.bulk-select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-family: 'DM Sans', sans-serif; font-size: 13px;}
          `}</style>

                          <tr key={inv.id} style={{ borderBottom: "1px solid #f0f0f0" }}>
                            <td style={{ padding: "7px 10px" }}><EditableCell value={inv.person} onChange={v => { const x=[...investments]; x[ii].person=v; setInvestments(x); }} /></td>
                            <td style={{ padding: "7px 10px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, color: "#4A90D9" }}><EditableCell value={inv.amount} onChange={v => { const x=[...investments]; x[ii].amount=v; setInvestments(x); }} type="number" mono style={{ textAlign:"right" }} /></td>
                            <td style={{ padding: "7px 10px", textAlign: "center" }}><EditableCell value={inv.method} onChange={v => { const x=[...investments]; x[ii].method=v; setInvestments(x); }} style={{ textAlign:"center", fontSize:12 }} /></td>
                            <td style={{ padding: "7px 10px", textAlign: "center" }}><EditableCell value={inv.date} onChange={v => { const x=[...investments]; x[ii].date=v; setInvestments(x); }} isDate={true} activeMonthIdx={currentMonth} style={{ textAlign:"center" }} /></td>
                            <td style={{ padding: "7px 10px" }}><EditableCell value={inv.comment || ""} onChange={v => { const x=[...investments]; x[ii].comment=v; setInvestments(x); }} style={{ fontSize:12, color:"#666" }} /></td>
                            <td style={{ padding: "7px 10px", textAlign: "center" }}><button onClick={() => removeInvestment(inv.id)} style={{ border:"none", background:"none", cursor:"pointer", fontSize:14 }}>🗑️</button></td>
                          </tr>
                        ))}
                        {allEntries.length === 0 && <tr><td colSpan={6} style={{ padding: 16, textAlign: "center", color: "#bbb", fontSize: 13 }}>Немає записів · авто-записи появляться якщо витрати зі не-агентських рахунків</td></tr>}
                      </tbody>
                    </table>
                  </div>
                  <div style={{ padding: "10px 16px", borderTop: "1px solid #eee" }}>
                    <button className="btn btn-primary" onClick={() => setShowAddInvestment(true)}>➕ Додати вкладення</button>
                  </div>
                </div>
              );
            })()}

            {/* BULK ACTIONS & EXPORT */}
            <div style={{ background: "#fff", borderRadius: 10, padding: "16px 20px", boxShadow: "0 2px 12px rgba(0,0,0,.08)", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
               <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#555" }}>Вибрано: {selectedTx.size} транзакцій, {selectedExp.size} витрат</span>
                  <select className="bulk-select" value={bulkTargetMonth} onChange={(e) => setBulkTargetMonth(e.target.value)}>
                     {getMonthOptions()}
                  </select>
                  <button className="btn btn-action" onClick={() => handleBulkAction('copy')} disabled={selectedTx.size === 0 && selectedExp.size === 0}>📋 Копіювати в</button>
                  <button className="btn btn-action" onClick={() => handleBulkAction('move')} disabled={selectedTx.size === 0 && selectedExp.size === 0} style={{color: "#DC2626"}}>📦 Перенести в</button>
               </div>
               
               <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button className="btn btn-secondary" onClick={exportSelected} style={{ fontSize: 13 }}>📥 Експорт</button>
                  <button className="btn btn-secondary" onClick={() => importInputRef.current?.click()} style={{ fontSize: 13 }}>📤 Імпорт JSON</button>
               </div>
            </div>
            
          </div>

          {/* MODAL: Add Worker */}
          {showAddWorker && (<div className="modal-overlay" onClick={() => setShowAddWorker(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Додати працівника</h3>
            <label>Ім'я<input value={newWorker.name} onChange={e => setNewWorker({ ...newWorker, name: e.target.value })} placeholder="Ім'я" autoFocus /></label>
            <label>Роль<input value={newWorker.role} onChange={e => setNewWorker({ ...newWorker, role: e.target.value })} placeholder="Посада" /></label>
            <label>Колір<div style={{ display: "flex", gap: 8, marginTop: 6 }}>{WORKER_COLORS.map((c, i) => (<div key={i} onClick={() => setNewWorker({ ...newWorker, colorIdx: i })} style={{ width: 32, height: 32, borderRadius: 6, background: c.bg, cursor: "pointer", border: newWorker.colorIdx === i ? `3px solid ${c.text}` : "2px solid transparent" }} />))}</div></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowAddWorker(false)}>Скасувати</button><button className="btn btn-primary" onClick={addWorker}>Додати</button></div>
          </div></div>)}

          {/* MODAL: Add/Edit Expense */}
          {showAddExpense && (<div className="modal-overlay" onClick={() => { setShowAddExpense(false); setEditExpense(null); }}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editExpense ? "Редагувати витрату" : "Додати витрату"}</h3>
            <label>Сервіс<input value={newExpense.service} onChange={e => setNewExpense({ ...newExpense, service: e.target.value })} placeholder="Назва сервісу" autoFocus /></label>
            <label>Платіжка<input list="accounts-list" value={newExpense.persona} onChange={e => setNewExpense({ ...newExpense, persona: e.target.value })} style={{ marginTop: 4 }} placeholder="Звідки платимо" /></label>
            <label>Метод оплати<select value={newExpense.method} onChange={e => setNewExpense({ ...newExpense, method: e.target.value })}><option>USDT</option><option>USD</option><option>EUR</option><option>UAH</option><option>Card</option></select></label>
            <label>Дата<input value={newExpense.date} onChange={e => setNewExpense({ ...newExpense, date: e.target.value })} placeholder="ДД.ММ" /></label>
            <label>Сума ($)<input type="number" value={newExpense.cost} onChange={e => setNewExpense({ ...newExpense, cost: parseFloat(e.target.value) || 0 })} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => { setShowAddExpense(false); setEditExpense(null); }}>Скасувати</button><button className="btn btn-primary" onClick={addExpense}>{editExpense ? "Зберегти" : "Додати"}</button></div>
          </div></div>)}

          {/* MODAL: Add Transfer */}
          {showTransfer && (<div className="modal-overlay" onClick={() => setShowTransfer(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Переказ між платіжками</h3>
            <label>Відправник (Звідки)<input list="accounts-list" value={newTransfer.fromAcc} onChange={e => setNewTransfer({ ...newTransfer, fromAcc: e.target.value })} placeholder="Виберіть або введіть..." autoFocus /></label>
            <label>Отримувач (Куди)<input list="accounts-list" value={newTransfer.toAcc} onChange={e => setNewTransfer({ ...newTransfer, toAcc: e.target.value })} placeholder="Виберіть або введіть..." /></label>
            <label>Сума ($)<input type="number" value={newTransfer.amount} onChange={e => setNewTransfer({ ...newTransfer, amount: parseFloat(e.target.value) || 0 })} /></label>
            <label>Комісія за переказ ($)<input type="number" value={newTransfer.fee} onChange={e => setNewTransfer({ ...newTransfer, fee: parseFloat(e.target.value) || 0 })} /></label>
            <label>Дата<input value={newTransfer.date} onChange={e => setNewTransfer({ ...newTransfer, date: e.target.value })} placeholder="ДД.ММ" /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowTransfer(false)}>Скасувати</button><button className="btn btn-primary" onClick={addTransfer}>Додати</button></div>
          </div></div>)}

          {/* MODAL: Add Account */}
          {showAddAccount && (<div className="modal-overlay" onClick={() => setShowAddAccount(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editAccount ? "Редагувати платіжку" : "Додати платіжку"}</h3>
            <label>Назва<input value={newAccountForm.name} onChange={e => setNewAccountForm({ ...newAccountForm, name: e.target.value })} placeholder="Назва рахунку" autoFocus /></label>
            <label>Власник<input value={newAccountForm.owner} onChange={e => setNewAccountForm({ ...newAccountForm, owner: e.target.value })} placeholder="Власник" /></label>
            <label>Ліміт обороту ($)<input type="number" value={newAccountForm.limit} onChange={e => setNewAccountForm({ ...newAccountForm, limit: parseFloat(e.target.value) || 0 })} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowAddAccount(false)}>Скасувати</button><button className="btn btn-primary" onClick={submitAccountForm}>{editAccount ? "Зберегти" : "Додати"}</button></div>
          </div></div>)}

          {/* MODAL: Add Investment */}
          {showAddProduct && (<div className="modal-overlay" onClick={() => { setShowAddProduct(false); setEditProduct(null); }}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editProduct ? "Редагувати продукт" : "Новий продукт"}</h3>
            <label>Назва<input value={newProduct.name} onChange={e => setNewProduct({ ...newProduct, name: e.target.value })} placeholder="Mentorship, Media Buying..." autoFocus /></label>
            <label>Середній чек ($)<input type="number" value={newProduct.avgPrice} onChange={e => setNewProduct({ ...newProduct, avgPrice: parseFloat(e.target.value) || 0 })} /></label>
            <label style={{ display: "flex", alignItems: "center", gap: 10 }}>Колір<input type="color" value={newProduct.color} onChange={e => setNewProduct({ ...newProduct, color: e.target.value })} style={{ width: 48, height: 34, padding: 2, border: "1.5px solid #ddd", borderRadius: 6, cursor: "pointer", marginTop: 4 }} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => { setShowAddProduct(false); setEditProduct(null); }}>Скасувати</button><button className="btn btn-primary" onClick={addProduct}>{editProduct ? "Зберегти" : "Додати"}</button></div>
          </div></div>)}

          {showAddInvestment && (<div className="modal-overlay" onClick={() => setShowAddInvestment(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Додати вкладення</h3>
            <label>Фаундер<input value={newInvestment.person} onChange={e => setNewInvestment({ ...newInvestment, person: e.target.value })} placeholder="Ім'я фаундера" autoFocus /></label>
            <label>Сума ($)<input type="number" value={newInvestment.amount} onChange={e => setNewInvestment({ ...newInvestment, amount: parseFloat(e.target.value) || 0 })} /></label>
            <label>Метод<select value={newInvestment.method} onChange={e => setNewInvestment({ ...newInvestment, method: e.target.value })}><option>USD</option><option>USDT</option><option>EUR</option><option>PLN</option><option>Card</option></select></label>
            <label>Дата<input value={newInvestment.date} onChange={e => setNewInvestment({ ...newInvestment, date: e.target.value })} placeholder="ДД.ММ" /></label>
            <label>Коментар<textarea value={newInvestment.comment} onChange={e => setNewInvestment({ ...newInvestment, comment: e.target.value })} placeholder="Деталі вкладення..." style={{ resize: "vertical", minHeight: 60 }} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowAddInvestment(false)}>Скасувати</button><button className="btn btn-primary" onClick={addInvestment}>Додати</button></div>
          </div></div>)}
        </div>
      );
    };

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });

        const {
          data: { subscription },
        } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => subscription.unsubscribe();
      }, []);

      if (loading) return <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontFamily: "'DM Sans', sans-serif" }}><h2>Перевірка безпеки...</h2></div>;

      return session ? <Dashboard userEmail={session.user.email} onLogout={() => supabase.auth.signOut()} /> : <LoginScreen />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

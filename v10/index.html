    const fmt = (n) => {
      if (n == null || isNaN(n)) return "$0.00";
      const abs = Math.abs(n);
      const s = abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return n < 0 ? `-$${s}` : `$${s}`;
    };
    
    const parseNum = (v) => {
      if (v === "" || v == null) return 0;
      const s = String(v).replace(/[^0-9.,-]/g, "").replace(",", ".");
      return parseFloat(s) || 0;
    };

    const incrementDate = (dateStr) => {
      if (!dateStr || !dateStr.includes('.')) return dateStr;
      const parts = dateStr.split('.');
      let day = parseInt(parts[0]) || 1;
      let month = parseInt(parts[1]) || 1;
      month += 1;
      if (month > 12) { month = 1; }
      return String(day).padStart(2, '0') + '.' + String(month).padStart(2, '0');
    };

      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);

    const Icon = ({ name, size = 16, color = "currentColor", strokeWidth = 2, style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>{ICON_PATHS[name]}</svg>

    const makeWorkerPay = (workers) => {
      const o = {};
      workers.forEach((w) => { o[w.id] = { amount: 0, paid: false, comment: "", advance: 0 }; });
      return o;
    };

    const resolveAccount = (raw) => {
      if (!raw) return "";
      if (raw.includes(">")) return raw.split(">").pop().trim();
      return raw.trim();
    };

    const EditableCell = ({ value, onChange, type = "text", className = "", style = {}, mono = false, isDate = false, activeMonthIdx = 0, multiline = false }) => {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value === 0 && type === "number" ? "" : String(value ?? ""));
      const inputRef = useRef(null);
      
      useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);
      useEffect(() => { if (!editing) setDraft(value === 0 && type === "number" ? "" : String(value ?? "")); }, [value, editing, type]);
      
      const commit = () => { 
        let finalVal = draft;
        if (isDate && /^\d{1,2}$/.test(finalVal.trim())) {
          finalVal = `${finalVal.trim().padStart(2, '0')}.${String(activeMonthIdx + 1).padStart(2, '0')}`;
        }
        onChange(type === "number" ? parseNum(finalVal) : finalVal); 
        setEditing(false); 
      };
      
      const cancel = () => { setDraft(value === 0 && type === "number" ? "" : String(value ?? "")); setEditing(false); };
      
      if (editing) {
        if (multiline) {
           return <textarea ref={inputRef} value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Escape") cancel(); }} onBlur={commit} style={{ width: "100%", boxSizing: "border-box", padding: "4px 6px", border: "2px solid #4A90D9", borderRadius: 3, fontFamily: "'DM Sans',sans-serif", fontSize: 11, outline: "none", background: "#1A1A1A", resize: "vertical", minHeight: 50, ...style }} className={className} />
        }
        return (<input ref={inputRef} value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") cancel(); }} onBlur={commit} style={{ width: "100%", boxSizing: "border-box", padding: "4px 6px", border: "2px solid #4A90D9", borderRadius: 3, fontFamily: mono ? "'JetBrains Mono',monospace" : "'DM Sans',sans-serif", fontSize: 13, outline: "none", background: "#1A1A1A", ...style }} className={className} />);
      }
      return (<div onClick={() => setEditing(true)} style={{ cursor: "text", padding: "4px 6px", minHeight: 22, borderRadius: 3, fontFamily: mono ? "'JetBrains Mono',monospace" : "'DM Sans',sans-serif", fontSize: 13, transition: "background .15s", ...style }} className={`editable-cell ${className}`} title={type !== "number" ? value : undefined}>{type === "number" ? fmt(value) : (value || "")}</div>);
    };

    const CommentCell = ({ value, onChange }) => {
      const [expanded, setExpanded] = useState(false);
      const handleToggle = (e) => { e.stopPropagation(); setExpanded(!expanded); };
      
      if (!value) return <span className="comment-icon" onClick={() => onChange("...")} style={{ padding: "0 6px", display: "inline-flex", color: "#888" }}><Icon name="note" size={12} /></span>;

        // Fiat rates — try open.er-api.com first, frankfurter.app as fallback
        try {
          const fxRes = await fetch('https://open.er-api.com/v6/latest/EUR');
          if (fxRes.ok) {
            const fxData = await fxRes.json();
            if (fxData.result === 'success' && fxData.rates?.USD) {
              eurToUsd = fxData.rates.USD;
              eurToPln = fxData.rates.PLN || 1;
            }
          }
        } catch(e) { console.error('open.er-api error', e); }
        if (eurToUsd === 1) {
          try {
            const fxRes2 = await fetch('https://api.frankfurter.app/latest?from=EUR');
            if (fxRes2.ok) {
              const fxData2 = await fxRes2.json();
              eurToUsd = fxData2.rates?.USD || 1;
              eurToPln = fxData2.rates?.PLN || 1;
            }
          } catch(e) { console.error('frankfurter error', e); }
        }
        // Crypto rates from CoinGecko (optional, fallback to 1)
        try {
          const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,usd-coin&vs_currencies=usd');
          if (cryptoRes.ok) {
            const cryptoData = await cryptoRes.json();
            usdtRate = cryptoData?.tether?.usd || 1;
            usdcRate = cryptoData?.['usd-coin']?.usd || 1;
          }
        } catch(e) { console.error('Crypto rates error', e); }
        setRates({
          USD: 1,
          EUR: eurToUsd,
          PLN: eurToUsd / eurToPln,
          USDT: usdtRate,
          USDC: usdcRate,
        });

        setLoading(false);

        const iv = setInterval(fetchRates, 5 * 60 * 1000);

      const result = useMemo(() => {

      const [salaryNotifyWorkerIds, setSalaryNotifyWorkerIds] = useState(() => {

      const [showSalarySettings, setShowSalarySettings] = useState(false);
      const [newAccountForm, setNewAccountForm] = useState({ name: "", owner: "", limit: 10000 });

      const [reconcileForm, setReconcileForm] = useState({ actual: 0, note: "" });

      const [showChecksPanel, setShowChecksPanel] = useState(false);
      const [newTransfer, setNewTransfer] = useState({ fromAcc: "", toAcc: "", amount: 0, fee: 0, date: "" });
      
      const [expandedAcct, setExpandedAcct] = useState(null);
      
      const [selectedTx, setSelectedTx] = useState(new Set());
      const [selectedExp, setSelectedExp] = useState(new Set());
      const [dragTxIdx, setDragTxIdx] = useState(null);
      const [dragExpIdx, setDragExpIdx] = useState(null);
      const [dragAccIdx, setDragAccIdx] = useState(null);
      const [dragWorkerIdx, setDragWorkerIdx] = useState(null);

      const [bulkTargetMonth, setBulkTargetMonth] = useState(`${currentMonth === 11 ? currentYear + 1 : currentYear}-${currentMonth === 11 ? 0 : currentMonth + 1}`);
      
      const historyRef = useRef([]);
      const MAX_HISTORY = 30;
      const hasLoadedRef = useRef(false); // true once initial fetch completes — prevents premature saves

      // Reconciliation backup helpers — dedicated localStorage key, updated immediately on every reconcile
      const backupReconciliations = (accs) => {
        try {
          const map = {};
          accs.forEach(a => { if ((a.reconciliations || []).length > 0) map[a.id] = a.reconciliations; });
          if (Object.keys(map).length > 0) localStorage.setItem('adv_reconciliations', JSON.stringify(map));
        } catch(e) {}
      };
      // Merge reconciliation backup into accounts array — always keeps the version with more entries
      const mergeReconciliations = (accs) => {
        try {
          const raw = localStorage.getItem('adv_reconciliations');
          if (!raw) return accs;
          const map = JSON.parse(raw);
          return accs.map(a => {
            const bak = map[a.id] || [];
            const cur = a.reconciliations || [];
            return bak.length > cur.length ? { ...a, reconciliations: bak } : a;
          });
        } catch(e) { return accs; }
      };

      useEffect(() => {
        async function fetchData() {
          const { data: settings } = await supabase.from('global_settings').select('*').eq('id', 1).single();
          if (settings) {
            if (settings.workers && settings.workers.length > 0) setWorkers(settings.workers);
            if (settings.accounts && settings.accounts.length > 0) {
              // Always merge reconciliation backup — so even if Supabase lost reconciliations, local backup restores them
              const merged = mergeReconciliations(settings.accounts);
              setAccounts(merged);
              localStorage.setItem('adv_accounts', JSON.stringify(merged));
            } else {
              try {
                const la = localStorage.getItem('adv_accounts');
                if (la) {
                  const aa = JSON.parse(la);
                  if (aa.length > 0) { setAccounts(mergeReconciliations(aa)); }
                }
              } catch(e) {}
            }
            if (settings.products && settings.products.length > 0) {
              setProducts(settings.products);
              localStorage.setItem('adv_products', JSON.stringify(settings.products));
            } else {
              // Fallback: restore from localStorage if Supabase column is missing/empty
              try {
                const lp = localStorage.getItem('adv_products');
                if (lp) { const pp = JSON.parse(lp); if (pp.length > 0) setProducts(pp); }
              } catch(e) {}
            }
          }

          const { data: months } = await supabase.from('monthly_data').select('*');
          if (months && months.length > 0) {
            const md = {};
            months.forEach(m => { md[m.month_key] = m.data; });
            setMonthData(md);
          } else {
             setMonthData({ "2026-2": { transactions: [], expenses: [], transfers: [], carryover: 0 } });
          }
          setIsInitialLoad(false);
          hasLoadedRef.current = true;
        }
        fetchData();
      }, []);

      useEffect(() => {
        if (isInitialLoad || !hasLoadedRef.current) return;
        const timer = setTimeout(async () => {
          // Merge reconciliation backup before saving to Supabase — ensures we never lose reconciliations
          const accountsToSave = accounts.length > 0 ? mergeReconciliations(accounts) : accounts;
          await supabase.from('global_settings').upsert({ id: 1, workers, accounts: accountsToSave, products });
          if (products.length > 0) localStorage.setItem('adv_products', JSON.stringify(products));
          if (accountsToSave.length > 0) localStorage.setItem('adv_accounts', JSON.stringify(accountsToSave));

          const updates = Object.keys(monthData).map(key => ({ month_key: key, data: monthData[key] }));
          if (updates.length > 0) {
             await supabase.from('monthly_data').upsert(updates);
          }
          setLastSaved(Date.now());
        }, 1500); 
        return () => clearTimeout(timer);
      }, [workers, accounts, products, monthData, isInitialLoad]);

      const pushHistory = useCallback(() => {
        historyRef.current = [...historyRef.current.slice(-(MAX_HISTORY - 1)), JSON.parse(JSON.stringify(monthData))];
      }, [monthData]);

      const undo = useCallback(() => {
        if (historyRef.current.length === 0) return;
        const prev = historyRef.current.pop();
        setMonthData(prev);
      }, []);

      const monthKey = `${currentYear}-${currentMonth}`;

      const logAction = (action, detail = '') => {
        const entry = { id: uid(), ts: Date.now(), action, detail, month: `${MONTHS_UA[currentMonth]} ${currentYear}` };
        try {
          const prev = JSON.parse(localStorage.getItem('adv_action_log') || '[]');
          localStorage.setItem('adv_action_log', JSON.stringify([entry, ...prev].slice(0, 500)));
        } catch(e) {}
      };
      const data = monthData[monthKey] || { transactions: [], expenses: [], transfers: [], investments: [], carryover: 0 };
      const transactions = data.transactions || [];
      const expenses = data.expenses || [];
      const transfers = data.transfers || [];
      const investments = data.investments || [];
      const carryover = data.carryover || 0;

      const setTransactions = (txs) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, transactions: typeof txs === "function" ? txs(data.transactions || []) : txs } })); };
      const setExpenses = (exps) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, expenses: typeof exps === "function" ? exps(data.expenses || []) : exps } })); };
      const setTransfers = (trfs) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, transfers: typeof trfs === "function" ? trfs(data.transfers || []) : trfs } })); };
      const setInvestments = (invs) => { pushHistory(); setMonthData((p) => ({ ...p, [monthKey]: { ...data, investments: typeof invs === "function" ? invs(data.investments || []) : invs } })); };

      // Only "received" (confirmed green) transactions count toward statistics.
      // Unconfirmed deals are shown in the table but excluded from all totals.
      const isReceivedTx = (t) => t.status === 'received';
      const totalPayment = useMemo(() => transactions.filter(isReceivedTx).reduce((s, t) => s + parseNum(t.payment), 0), [transactions]);
      const totalRev = useMemo(() => transactions.filter(isReceivedTx).reduce((s, t) => s + parseNum(t.agencyRev), 0), [transactions]);
      const totalCosts = useMemo(() => transactions.filter(isReceivedTx).reduce((s, t) => s + parseNum(t.costTax), 0), [transactions]);
      const pendingPayment = useMemo(() => transactions.filter(t => !isReceivedTx(t)).reduce((s, t) => s + parseNum(t.payment), 0), [transactions]);
      const pendingRev = useMemo(() => transactions.filter(t => !isReceivedTx(t)).reduce((s, t) => s + parseNum(t.agencyRev), 0), [transactions]);
      const totalExpenses = useMemo(() => expenses.reduce((s, e) => s + parseNum(e.cost), 0), [expenses]);
      const agencyBudget = totalRev - totalExpenses + carryover;

      // Balance of personal accounts (all months): received (transactions) − spent (expenses)
      // Excludes agency accounts AND worker names (they are not personal founder accounts)
      // Personal (non-agency) account balance.
      // When a deal is received on a personal account, the full client payment lands there,
      // but salaries (paid out to workers) and cost/tax leave the account too — only the
      // agency-budget portion (agencyRev) should remain on the balance, minus direct expenses.
      const personalAccountStats = useMemo(() => {
        const agencyNames = new Set(accounts.map(a => a.name.toLowerCase().trim()));
        const workerNames = new Set(workers.map(w => w.name.toLowerCase().trim()));
        const excluded = new Set([...agencyNames, ...workerNames]);
        const stats = {};
        const ensure = (acc) => { if (!stats[acc]) stats[acc] = { received: 0, spent: 0 }; return stats[acc]; };
        Object.values(monthData).forEach(md => {
          (md.transactions || []).forEach(tx => {
            if (tx.status !== 'received') return; // only confirmed deals actually moved money
            const acc = resolveAccount(tx.platforma)?.trim();
            if (acc && !excluded.has(acc.toLowerCase())) {
              const s = ensure(acc);
              s.received += parseNum(tx.payment);
              // money that leaves the account: salaries + cost/tax
              const salaries = (workers || []).reduce((sum, w) => sum + parseNum(tx.workerPay?.[w.id]?.amount), 0);
              s.spent += salaries + parseNum(tx.costTax);
            }
          });
          (md.expenses || []).forEach(ex => {
            const acc = ex.persona?.trim();
            if (acc && !excluded.has(acc.toLowerCase())) {
              ensure(acc).spent += parseNum(ex.cost);
            }
          });
        });
        return stats;
      }, [accounts, workers, monthData]);

      // Expenses paid from personal (non-agency, non-worker) accounts → auto-show in investments
      const personalExpInvestments = useMemo(() => {
        const agencyNames = new Set(accounts.map(a => a.name.toLowerCase().trim()));
        const workerNames = new Set(workers.map(w => w.name.toLowerCase().trim()));
        const excluded = new Set([...agencyNames, ...workerNames]);
        return expenses
          .filter(ex => ex.persona && ex.persona.trim() && !excluded.has(ex.persona.toLowerCase().trim()))
          .map(ex => ({
            id: 'auto_' + ex.id,
            person: ex.persona,
            amount: ex.cost,
            method: ex.method || 'USD',
            date: ex.date,
            comment: ex.service,
            auto: true,
          }));
      }, [expenses, accounts, workers]);

      // Product sales stats computed across all months
      const productStats = useMemo(() => {
        return products.map(p => {
          let totalSales = 0, monthSales = 0;
          Object.entries(monthData).forEach(([key, md]) => {
            // Only approved (received) transactions count toward product sales
            const cnt = (md.transactions || []).filter(t => t.status === 'received' && t.service && t.service.toLowerCase() === p.name.toLowerCase()).length;
            totalSales += cnt;
            if (key === monthKey) monthSales = cnt;
          });
          return { ...p, totalSales, monthSales };
        });
      }, [products, monthData, monthKey]);

      const addProduct = () => {
        if (!newProduct.name.trim()) return;
        if (editProduct) {
          setProducts(p => p.map(pr => pr.id === editProduct.id ? { ...pr, ...newProduct } : pr));
          setEditProduct(null);
        } else {
          setProducts(p => [...p, { id: uid(), ...newProduct }]);
        }
        setNewProduct({ name: "", color: "#4A90D9", avgPrice: 0 });
        setShowAddProduct(false);
      };
      const removeProduct = (id) => setProducts(p => p.filter(pr => pr.id !== id));
      const startEditProduct = (pr) => { setEditProduct(pr); setNewProduct({ name: pr.name, color: pr.color, avgPrice: pr.avgPrice }); setShowAddProduct(true); };

      const clientNames = useMemo(() => {
        const set = new Set();
        Object.values(monthData).forEach(md => (md.transactions || []).forEach(t => { if (t.client && t.client.trim()) set.add(t.client.trim()); }));
        return [...set].sort();
      }, [monthData]);

      // Month P&L summary
      const monthPL = useMemo(() => {
        const salariesPaid = transactions.reduce((s, t) => s + workers.reduce((ss, w) => { const wp = t.workerPay?.[w.id]; return ss + (wp?.paid ? parseNum(wp.amount) : 0); }, 0), 0);
        const salariesPending = transactions.reduce((s, t) => s + workers.reduce((ss, w) => { const wp = t.workerPay?.[w.id]; return ss + (wp && !wp.paid ? parseNum(wp.amount) : 0); }, 0), 0);
        const clientCosts = expenses.filter(e => e.costType === 'client').reduce((s, e) => s + parseNum(e.cost), 0);
        const agencyExpenses = expenses.filter(e => e.costType !== 'client').reduce((s, e) => s + parseNum(e.cost), 0);
        const margin = totalRev - totalExpenses;
        return { revenue: totalRev, turnover: totalPayment, totalExpenses, agencyExpenses, clientCosts, salariesPaid, salariesPending, margin, carryover, budget: agencyBudget };
      }, [transactions, expenses, workers, totalRev, totalExpenses, totalPayment, carryover, agencyBudget]);

      // Annual stats (whole currentYear) — received transactions only
      const annualStats = useMemo(() => {
        let turnover = 0, revenue = 0, costs = 0, expenses = 0, salaries = 0, deals = 0, pendingRevA = 0;
        const byMonth = [];
        for (let mi = 0; mi < 12; mi++) {
          const md = monthData[`${currentYear}-${mi}`];
          let mRev = 0, mExp = 0;
          if (md) {
            (md.transactions || []).forEach(t => {
              if (t.status === 'received') {
                turnover += parseNum(t.payment); revenue += parseNum(t.agencyRev); costs += parseNum(t.costTax); deals += 1; mRev += parseNum(t.agencyRev);
                workers.forEach(w => { const wp = t.workerPay?.[w.id]; if (wp?.paid) salaries += parseNum(wp.amount); });
              } else {
                pendingRevA += parseNum(t.agencyRev);
              }
            });
            (md.expenses || []).forEach(e => { expenses += parseNum(e.cost); mExp += parseNum(e.cost); });
          }
          byMonth.push({ month: MONTHS_UA[mi].slice(0,3), rev: mRev, exp: mExp, margin: mRev - mExp });
        }
        return { turnover, revenue, costs, expenses, salaries, deals, pendingRevA, margin: revenue - expenses, byMonth };
      }, [monthData, currentYear, workers]);

      const workerTotals = useMemo(() => {
        const m = {};
        workers.forEach((w) => { m[w.id] = { paid: 0, pending: 0 }; });
        transactions.forEach((t) => { workers.forEach((w) => { const wp = t.workerPay?.[w.id]; if (wp && wp.amount) { if (wp.paid) m[w.id].paid += parseNum(wp.amount); else m[w.id].pending += parseNum(wp.amount); } }); });
        // Expenses linked to a worker (e.g. salary paid via agency expense)
        expenses.forEach(ex => { if (ex.workerLink && m[ex.workerLink]) m[ex.workerLink].paid += parseNum(ex.cost); });
        return m;
      }, [transactions, expenses, workers]);

      const accountUsage = useMemo(() => {
        const allTx = []; const allExp = []; const allTransfers = [];
        Object.values(monthData).forEach(md => {
          if (md.transactions) allTx.push(...md.transactions);
          if (md.expenses) allExp.push(...md.expenses);
          if (md.transfers) allTransfers.push(...md.transfers);
        });
        
        return accounts.map(acc => {
          const txListGlobal = allTx.filter(tx => resolveAccount(tx.platforma) === acc.name && tx.status === 'received');
          const expListGlobal = allExp.filter(ex => ex.persona === acc.name);
          const transfersOutGlobal = allTransfers.filter(tr => tr.fromAcc === acc.name);
          const transfersInGlobal = allTransfers.filter(tr => tr.toAcc === acc.name);
          
          const agencyRevTotal = txListGlobal.reduce((s, tx) => s + parseNum(tx.agencyRev), 0);
          const txTotal = txListGlobal.reduce((s, tx) => s + parseNum(tx.payment), 0);
          const expTotalAcc = expListGlobal.reduce((s, ex) => s + parseNum(ex.cost), 0);
          const trOutTotal = transfersOutGlobal.reduce((s, tr) => s + parseNum(tr.amount) + parseNum(tr.fee), 0);
          const trInTotal = transfersInGlobal.reduce((s, tr) => s + parseNum(tr.amount), 0);
          
          const used = txTotal + expTotalAcc + trOutTotal - trInTotal;
          const pct = acc.limit > 0 ? (used / acc.limit) * 100 : 0;
          const accountBudget = agencyRevTotal - expTotalAcc - trOutTotal + trInTotal;
          
          const txList = transactions.filter(tx => resolveAccount(tx.platforma) === acc.name);
          const expList = expenses.filter(ex => ex.persona === acc.name);
          const trOutList = transfers.filter(tr => tr.fromAcc === acc.name);
          const trInList = transfers.filter(tr => tr.toAcc === acc.name);
          
          return { ...acc, used, remaining: acc.limit - used, pct, accountBudget, txList, expList, trOutList, trInList };
        });
      }, [accounts, monthData, transactions, expenses, transfers]);

      // Sum of latest verified (reconciled) balances, falling back to system balance for unreconciled accounts
      const verifiedBudget = useMemo(() => {
        if (!accountUsage.length) return null;
        return accountUsage.reduce((sum, a) => {
          const recs = a.reconciliations || [];
          const last = recs.length ? recs[recs.length - 1] : null;
          return sum + (last ? last.actual : a.accountBudget);
        }, 0);
      }, [accountUsage]);

      const reconciledCount = useMemo(() => accountUsage.filter(a => (a.reconciliations || []).length > 0).length, [accountUsage]);

      const rowDiff = useCallback((t) => {
        const wp = workers.reduce((s, w) => s + parseNum(t.workerPay?.[w.id]?.amount), 0);
        return parseNum(t.payment) - wp - parseNum(t.costTax) - parseNum(t.agencyRev);
      }, [workers]);

      // Predictive checks — flags cases that likely cause budget mismatch
      const anomalies = useMemo(() => {
        const out = [];
        const plural = (n) => n > 1 ? 's' : '';

        const unbalanced = transactions.filter(t => Math.abs(rowDiff(t)) > 0.01);
        if (unbalanced.length) out.push({ sev: 'high', section: 'operations', title: `${unbalanced.length} unbalanced transaction${plural(unbalanced.length)}`, detail: 'payment ≠ cost + REV + salaries — see the red rows in Transactions' });

        const noAcc = transactions.filter(t => t.status === 'received' && parseNum(t.payment) > 0 && !resolveAccount(t.platforma));
        if (noAcc.length) out.push({ sev: 'high', section: 'operations', title: `${noAcc.length} received deal${plural(noAcc.length)} with no account`, detail: 'money received but not attributed to any payment account — directly distorts balances' });

        const expNoAcc = expenses.filter(e => parseNum(e.cost) > 0 && !(e.persona || '').trim());
        if (expNoAcc.length) out.push({ sev: 'med', section: 'operations', title: `${expNoAcc.length} expense${plural(expNoAcc.length)} with no account`, detail: 'spending not tied to a payment account' });

        const noRev = transactions.filter(t => t.status === 'received' && parseNum(t.payment) > 0 && parseNum(t.agencyRev) === 0);
        if (noRev.length) out.push({ sev: 'med', section: 'operations', title: `${noRev.length} confirmed deal${plural(noRev.length)} with $0 REV`, detail: 'payment received but no agency revenue recorded — check the split' });

        accountUsage.filter(a => a.pct > 100).forEach(a => out.push({ sev: 'med', section: 'accounts', title: `${a.name} over turnover limit`, detail: `exceeded by ${fmt(a.used - a.limit)}` }));

        const bigFee = transfers.filter(tr => parseNum(tr.amount) > 0 && parseNum(tr.fee) > parseNum(tr.amount) * 0.1);
        if (bigFee.length) out.push({ sev: 'low', section: 'operations', title: `${bigFee.length} transfer${plural(bigFee.length)} with fee > 10%`, detail: 'unusually high transfer cost' });

        let totalDrift = 0, driftAccts = 0;
        accountUsage.forEach(a => {
          const recs = a.reconciliations || [];
          if (recs.length) { const last = recs[recs.length - 1]; if (Math.abs(last.delta) > 1) { driftAccts++; totalDrift += last.delta; } }
        });
        if (driftAccts) out.push({ sev: 'high', section: 'accounts', title: `Reconciliation drift on ${driftAccts} account${plural(driftAccts)}`, detail: `last verified balances differ from the system by ${fmt(totalDrift)} in total` });

        const neverRec = accountUsage.filter(a => !(a.reconciliations || []).length).length;
        if (neverRec && accountUsage.length) out.push({ sev: 'low', section: 'accounts', title: `${neverRec} account${plural(neverRec)} never reconciled`, detail: 'run a manual balance check to verify the books match reality' });

        const order = { high: 0, med: 1, low: 2 };
        return out.sort((a, b) => order[a.sev] - order[b.sev]);
      }, [transactions, expenses, transfers, accountUsage, rowDiff]);

      const prevMonth = () => { if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); } else setCurrentMonth(m => m - 1); };
      const nextMonth = () => { 
        const nm = currentMonth === 11 ? 0 : currentMonth + 1; 
        const ny = currentMonth === 11 ? currentYear + 1 : currentYear; 
        const nk = `${ny}-${nm}`; 
        setMonthData(p => ({ ...p, [nk]: { transactions: p[nk]?.transactions || [], expenses: p[nk]?.expenses || [], transfers: p[nk]?.transfers || [], carryover: agencyBudget } })); 
        setCurrentMonth(nm); 
        setCurrentYear(ny); 
      };

      const monthSuffix = '.' + String(currentMonth + 1).padStart(2, '0');
      const autoDate = (val) => {
        if (!val) return val;
        const clean = String(val).trim();
        if (/^\d{1,2}$/.test(clean)) return clean.padStart(2, '0') + monthSuffix;
        return clean;
      };

      const updateTx = (txId, field, val) => setTransactions(p => p.map(t => t.id === txId ? { ...t, [field]: field === 'date' ? autoDate(val) : val } : t));
      const updateWorkerPay = (txId, wId, field, val) => {
        if (field === 'paid') {
          const wName = workers.find(w => w.id === wId)?.name || '';
          const tx = transactions.find(t => t.id === txId);
          const wAmt = parseNum(tx?.workerPay?.[wId]?.amount);
          logAction(val ? `Salary paid — ${wName}` : `Salary unpaid — ${wName}`, [tx?.client, wAmt > 0 ? fmt(wAmt) : ''].filter(Boolean).join(' · '));
        }
        setTransactions(p => p.map(t => { if (t.id !== txId) return t; return { ...t, workerPay: { ...t.workerPay, [wId]: { ...t.workerPay[wId], [field]: val } } }; }));
      };
      const addTransaction = () => { setTransactions(p => [...p, { id: uid(), client: "", service: "", platforma: "", payment: 0, date: "", costTax: 0, agencyRev: 0, comment: "", invoice: null, status: 'pending', workerPay: makeWorkerPay(workers) }]); logAction('Added transaction'); };
      const removeTx = (id) => { const tx = transactions.find(t => t.id === id); setTransactions(p => p.filter(t => t.id !== id)); logAction('Deleted transaction', [tx?.client, parseNum(tx?.payment) > 0 ? fmt(parseNum(tx?.payment)) : '', resolveAccount(tx?.platforma) ? 'acc: ' + resolveAccount(tx.platforma) : ''].filter(Boolean).join(' · ')); };

      const handleBulkAction = (actionType) => {
        if (!bulkTargetMonth) return;
        const [tYear, tMonth] = bulkTargetMonth.split('-');
        const targetMonthIdx = parseInt(tMonth);
        
        const formatTransferredDate = (oldDate) => {
            if(!oldDate) return "";
            const parts = oldDate.split('.');
            if(parts.length >= 1) return `${parts[0].padStart(2, '0')}.${String(targetMonthIdx + 1).padStart(2, '0')}`;
            return oldDate;
        };

        const txsToProcess = transactions.filter(t => selectedTx.has(t.id));
        const expsToProcess = expenses.filter(e => selectedExp.has(e.id));
        
        pushHistory();
        
        setMonthData(prev => {
           const nextState = {...prev};
           if (!nextState[bulkTargetMonth]) nextState[bulkTargetMonth] = { transactions: [], expenses: [], transfers: [], carryover: 0 };
           
           const newTxs = txsToProcess.map(t => ({
             ...t, 
             id: uid(), 
             date: formatTransferredDate(t.date), 
             workerPay: Object.fromEntries(Object.entries(t.workerPay || {}).map(([k, v]) => [k, { ...v, paid: false }])) 
           }));
           
           const newExps = expsToProcess.map(e => ({
             ...e, 
             id: uid(), 
             date: formatTransferredDate(e.date) 
           }));
           
           nextState[bulkTargetMonth].transactions = [...(nextState[bulkTargetMonth].transactions || []), ...newTxs];
           nextState[bulkTargetMonth].expenses = [...(nextState[bulkTargetMonth].expenses || []), ...newExps];
           
           return nextState;
        });
        
        if (actionType === 'move') {
           setTransactions(prev => prev.filter(t => !selectedTx.has(t.id)));
           setExpenses(prev => prev.filter(e => !selectedExp.has(e.id)));
        }
        
        setSelectedTx(new Set());
        setSelectedExp(new Set());
      };

      const exportSelected = () => {
        const txToExport = selectedTx.size > 0 ? transactions.filter(t => selectedTx.has(t.id)) : transactions;
        const expToExport = selectedExp.size > 0 ? expenses.filter(e => selectedExp.has(e.id)) : expenses;
        const payload = { month: monthKey, transactions: txToExport, expenses: expToExport, transfers: transfers, exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `advantage-backup-${monthKey}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importInputRef = useRef(null);
      const handleImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = JSON.parse(reader.result);
            pushHistory();
            setMonthData(p => {
              const cur = p[monthKey] || { transactions: [], expenses: [], transfers: [], carryover: 0 };
              const updated = { ...cur };
              if (imported.transactions && Array.isArray(imported.transactions)) {
                updated.transactions = [...(cur.transactions || []), ...imported.transactions.map(t => ({ ...t, id: uid() }))];
              }
              if (imported.expenses && Array.isArray(imported.expenses)) {
                updated.expenses = [...(cur.expenses || []), ...imported.expenses.map(ex => ({ ...ex, id: uid() }))];
              }
              if (imported.transfers && Array.isArray(imported.transfers)) {
                updated.transfers = [...(cur.transfers || []), ...imported.transfers.map(tr => ({ ...tr, id: uid() }))];
              }
              return { ...p, [monthKey]: updated };
            });
          } catch (err) { alert('Invalid JSON file'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const onTxDragStart = (i) => setDragTxIdx(i);
      const onTxDragOver = (e, i) => { e.preventDefault(); };
      const onTxDrop = (i) => { if (dragTxIdx !== null && dragTxIdx !== i) setTransactions(p => arrayMove(p, dragTxIdx, i)); setDragTxIdx(null); };
      
      const onExpDragStart = (i) => setDragExpIdx(i);
      const onExpDragOver = (e, i) => { e.preventDefault(); };
      const onExpDrop = (i) => { if (dragExpIdx !== null && dragExpIdx !== i) setExpenses(p => arrayMove(p, dragExpIdx, i)); setDragExpIdx(null); };

      const onAccDragStart = (e, i) => { e.stopPropagation(); setDragAccIdx(i); };
      const onAccDragOver = (e, i) => { e.preventDefault(); e.stopPropagation(); };
      const onAccDrop = (e, i) => { e.stopPropagation(); if (dragAccIdx !== null && dragAccIdx !== i) setAccounts(p => arrayMove(p, dragAccIdx, i)); setDragAccIdx(null); };

      const onWorkerDragStart = (e, i) => { e.stopPropagation(); setDragWorkerIdx(i); };
      const onWorkerDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };
      const onWorkerDrop = (e, i) => { e.stopPropagation(); if (dragWorkerIdx !== null && dragWorkerIdx !== i) setWorkers(p => arrayMove(p, dragWorkerIdx, i)); setDragWorkerIdx(null); };

      const toggleSelectTx = (id) => setSelectedTx(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleSelectExp = (id) => setSelectedExp(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleAllTx = () => { if (selectedTx.size === transactions.length) setSelectedTx(new Set()); else setSelectedTx(new Set(transactions.map(t => t.id))); };
      const toggleAllExp = () => { if (selectedExp.size === expenses.length) setSelectedExp(new Set()); else setSelectedExp(new Set(expenses.map(e => e.id))); };

      const invoiceInputRef = useRef(null);
      const [invoiceTxId, setInvoiceTxId] = useState(null);
      const handleInvoiceUpload = (e) => { const file = e.target.files?.[0]; if (!file || !invoiceTxId) return; const r = new FileReader(); r.onload = () => { updateTx(invoiceTxId, "invoice", { name: file.name, data: r.result }); setInvoiceTxId(null); }; r.readAsDataURL(file); e.target.value = ""; };
      const triggerInvoiceUpload = (txId) => { setInvoiceTxId(txId); setTimeout(() => invoiceInputRef.current?.click(), 50); };
      const downloadInvoice = (inv) => { const a = document.createElement("a"); a.href = inv.data; a.download = inv.name; a.click(); };

      const addWorker = () => { if (!newWorker.name.trim()) return; const w = { id: uid(), name: newWorker.name.trim(), role: newWorker.role.trim(), colorIdx: newWorker.colorIdx % WORKER_COLORS.length }; setWorkers(p => [...p, w]); setMonthData(p => { const n = { ...p }; Object.keys(n).forEach(k => { n[k] = { ...n[k], transactions: (n[k].transactions || []).map(t => ({ ...t, workerPay: { ...t.workerPay, [w.id]: { amount: 0, paid: false } } })) }; }); return n; }); setNewWorker({ name: "", role: "", colorIdx: (newWorker.colorIdx + 1) % WORKER_COLORS.length }); setShowAddWorker(false); };
      const removeWorker = (wId) => { setWorkers(p => p.filter(w => w.id !== wId)); setMonthData(p => { const n = { ...p }; Object.keys(n).forEach(k => { n[k] = { ...n[k], transactions: (n[k].transactions || []).map(t => { const wp = { ...t.workerPay }; delete wp[wId]; return { ...t, workerPay: wp }; }) }; }); return n; }); };
      const updateWorkerField = (wId, field, val) => setWorkers(p => p.map(w => w.id === wId ? { ...w, [field]: val } : w));

      const addExpense = () => {
        if (!newExpense.service.trim()) return;
        const expData = { ...newExpense, date: autoDate(newExpense.date) };
        const detail = [newExpense.service, parseNum(newExpense.cost) > 0 ? fmt(parseNum(newExpense.cost)) : '', newExpense.persona || '', newExpense.costType || ''].filter(Boolean).join(' · ');
        if (editExpense) { setExpenses(p => p.map(e => e.id === editExpense.id ? { ...editExpense, ...expData } : e)); logAction('Updated expense', detail); }
        else { setExpenses(p => [...p, { id: uid(), ...expData }]); logAction('Added expense', detail); }
        setNewExpense({ service: "", persona: "", method: "USDT", date: "", cost: 0, recurring: false, workerLink: "", costType: "", clientName: "" }); setShowAddExpense(false); setEditExpense(null);
      };
      const removeExpense = (id) => { const ex = expenses.find(e => e.id === id); setExpenses(p => p.filter(e => e.id !== id)); logAction('Deleted expense', [ex?.service, parseNum(ex?.cost) > 0 ? fmt(parseNum(ex?.cost)) : '', ex?.persona || ''].filter(Boolean).join(' · ')); };
      const startEditExpense = (e) => { setEditExpense(e); setNewExpense({ service: e.service, persona: e.persona, method: e.method, date: e.date, cost: e.cost, recurring: e.recurring || false, workerLink: e.workerLink || "", costType: e.costType || "", clientName: e.clientName || "" }); setShowAddExpense(true); };

      const addTransfer = () => {
        if (!newTransfer.fromAcc || !newTransfer.toAcc) return;
        setTransfers(p => [...p, { id: uid(), ...newTransfer, date: autoDate(newTransfer.date) }]);
        logAction('Transfer added', [newTransfer.fromAcc + ' → ' + newTransfer.toAcc, fmt(parseNum(newTransfer.amount)), parseNum(newTransfer.fee) > 0 ? 'fee ' + fmt(parseNum(newTransfer.fee)) : ''].filter(Boolean).join(' · '));
        setNewTransfer({ fromAcc: "", toAcc: "", amount: 0, fee: 0, date: "" }); setShowTransfer(false);
      };
      const removeTransfer = (id) => { const tr = transfers.find(t => t.id === id); setTransfers(p => p.filter(t => t.id !== id)); logAction('Transfer deleted', tr ? tr.fromAcc + ' → ' + tr.toAcc + ' · ' + fmt(parseNum(tr.amount)) : ''); };

      const addInvestment = () => { if (!newInvestment.person.trim() || !newInvestment.amount) return; setInvestments(p => [...p, { id: uid(), ...newInvestment, date: autoDate(newInvestment.date) }]); setNewInvestment({ person: "", amount: 0, method: "USD", date: "", comment: "" }); setShowAddInvestment(false); };
      const removeInvestment = (id) => setInvestments(p => p.filter(i => i.id !== id));

      const submitAccountForm = () => { 
        if (!newAccountForm.name.trim()) return; 
        if (editAccount) {
          setAccounts(p => p.map(a => a.id === editAccount.id ? { ...a, name: newAccountForm.name.trim(), owner: newAccountForm.owner.trim(), limit: parseNum(newAccountForm.limit) } : a));
        } else {
          setAccounts(p => [...p, { id: uid(), name: newAccountForm.name.trim(), owner: newAccountForm.owner.trim(), limit: parseNum(newAccountForm.limit), isActive: true }]); 
        }
        setNewAccountForm({ name: "", owner: "", limit: 10000 }); 
        setShowAddAccount(false); 
        setEditAccount(null);
      };
      
      const startEditAccount = (acc) => {
         setEditAccount(acc);
         setNewAccountForm({ name: acc.name, owner: acc.owner, limit: acc.limit });
         setShowAddAccount(true);
      };
      
      const confirmRemoveAccount = (id) => {
         if(window.confirm("Delete this payment account? This affects limit display.")) {
            setAccounts(p => p.filter(a => a.id !== id));
         }
      };

      const toggleAccount = (id) => setAccounts(p => p.map(a => a.id === id ? { ...a, isActive: !a.isActive } : a));

      const submitReconcile = () => {
        if (!reconcileAccount) return;
        const actual = parseNum(reconcileForm.actual);
        const computed = reconcileAccount.computed;
        const entry = { id: uid(), ts: Date.now(), computed, actual, delta: actual - computed, note: reconcileForm.note.trim() };
        const newAccounts = accounts.map(a => a.id === reconcileAccount.id ? { ...a, reconciliations: [...(a.reconciliations || []), entry] } : a);
        setAccounts(newAccounts);
        // Immediately backup reconciliations — don't wait for the 1.5s debounced save
        backupReconciliations(newAccounts);

                      return (
                        <div key={p.id} style={{ background: "#141414", borderRadius: 10, padding: "14px 16px", borderLeft: `3px solid ${p.color}`, position: "relative" }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: p.color, marginBottom: 8 }}>{p.name}</div>
                          <div style={{ display: "flex", gap: 16 }}>
                            <div>
                              <div style={{ fontSize: 9, color: "#666", textTransform: "uppercase", letterSpacing: .4 }}>This month</div>
                              <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, fontWeight: 700, color: "#fff", lineHeight: 1.1 }}>{p.monthSales}</div>
                            </div>
                            <div>
                              <div style={{ fontSize: 9, color: "#666", textTransform: "uppercase", letterSpacing: .4 }}>All time</div>
                              <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, fontWeight: 700, color: "rgba(255,255,255,.45)", lineHeight: 1.1 }}>{p.totalSales}</div>
                            </div>
                          </div>
                          {p.avgPrice > 0 && <div style={{ fontSize: 10, color: "#666", marginTop: 6 }}>avg {fmt(p.avgPrice)} · est {fmt(annualRev)}/yr</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Awaiting payment this month */}
              {(() => {
                const pendingTotal = transactions.filter(t => t.status !== 'received').reduce((s,t) => s + parseNum(t.payment), 0);
                const pendingCount = transactions.filter(t => t.status !== 'received' && parseNum(t.payment) > 0).length;
                if (pendingTotal === 0) return null;
                return (
                  <div style={{ background: "#1A1A1A", borderRadius: 12, padding: "18px 24px", marginBottom: 24, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap", borderLeft: "4px solid #F59E0B" }}>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#E5E5E5", textTransform: "uppercase", letterSpacing: ".06em", opacity: .7, marginBottom: 4 }}>Awaiting payment</div>
                      <div style={{ fontSize: 11, color: "#666" }}>{pendingCount} deal{pendingCount !== 1 ? "s" : ""} not confirmed — mark the green circle when payment lands</div>
                    </div>
                    <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 30, fontWeight: 700, color: "#F59E0B" }}>{fmt(pendingTotal)}</div>
                  </div>
                );
              })()}

              <div style={{ background: "#1A1A1A", borderRadius: 10, padding: "24px 28px", boxShadow: "0 2px 12px rgba(0,0,0,.08)", marginBottom: 28 }}>
                <h2 style={{ fontSize: 18, fontWeight: 700, color: "#E5E5E5", marginBottom: 4 }}>P&L — {MONTHS_UA[currentMonth]} {currentYear}</h2>
                <div style={{ fontSize: 12, color: "#888", marginBottom: 20 }}>Is the agency profitable this month</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 14, marginBottom: 24 }}>
                  {[
                    { label: "Revenue (REV)", value: monthPL.revenue, color: "#16A34A", hint: "Agency commission" },
                    { label: "Agency expenses", value: -monthPL.agencyExpenses, color: "#DC2626", hint: "Excludes client costs" },
                    { label: "Salaries paid", value: -monthPL.salariesPaid, color: "#DC2626", hint: monthPL.salariesPending > 0 ? `+ ${fmt(monthPL.salariesPending)} pending` : "All paid" },
                    { label: "Month margin", value: monthPL.margin, color: monthPL.margin >= 0 ? "#16A34A" : "#DC2626", hint: "Revenue − all costs", big: true },
                  ].map((c, i) => (
                    <div key={i} style={{ border: `1px solid ${c.color}22`, borderLeft: `4px solid ${c.color}`, borderRadius: 10, padding: "16px 18px", background: c.big ? `${c.color}08` : "#222" }}>
                      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: .5, color: "#888", marginBottom: 6 }}>{c.label}</div>
                      <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: c.big ? 28 : 22, fontWeight: 700, color: c.color }}>{fmt(c.value)}</div>
                      <div style={{ fontSize: 10, color: "#aaa", marginTop: 4 }}>{c.hint}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12, paddingTop: 20, borderTop: "1px solid #2a2a2a" }}>
                  {[
                    { label: "Agency turnover", value: monthPL.turnover },
                    { label: "Client-billed costs", value: monthPL.clientCosts, color: "#9333EA" },
                    { label: "Carryover", value: monthPL.carryover, color: "#F59E0B" },
                    { label: verifiedBudget !== null ? "Accounts balance ✓" : "Agency budget (cumulative)", value: verifiedBudget !== null ? verifiedBudget : monthPL.budget, color: (verifiedBudget !== null ? verifiedBudget : monthPL.budget) >= 0 ? "#16A34A" : "#DC2626" },
                  ].map((c, i) => (
                    <div key={i}>
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{c.label}</div>
                      <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 16, fontWeight: 600, color: c.color || "#E5E5E5" }}>{fmt(c.value)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Real Accounts Balance */}
              {accountUsage.length > 0 && (
                <div style={{ background: "#1A1A1A", borderRadius: 10, padding: "24px 28px", boxShadow: "0 2px 12px rgba(0,0,0,.08)", marginBottom: 28 }}>
                  <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <h2 style={{ fontSize: 18, fontWeight: 700, color: "#E5E5E5", marginBottom: 4 }}>Real Accounts Balance</h2>
                      <div style={{ fontSize: 12, color: "#888" }}>
                        {reconciledCount === 0
                          ? "No accounts reconciled yet — values below are system estimates"
                          : `${reconciledCount} of ${accountUsage.length} account${accountUsage.length > 1 ? "s" : ""} reconciled · unreconciled show system estimate`}
                      </div>
                    </div>
                    {verifiedBudget !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 11, color: "#666", textTransform: "uppercase", letterSpacing: .5, marginBottom: 3 }}>Total verified</div>
                        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 28, fontWeight: 700, color: verifiedBudget >= 0 ? "#4ADE80" : "#F87171" }}>{fmt(verifiedBudget)}</div>
                        {Math.abs(verifiedBudget - agencyBudget) > 0.5 && (
                          <div style={{ fontSize: 11, color: "#F59E0B", marginTop: 3 }}>
                            Δ {fmt(verifiedBudget - agencyBudget)} vs P&L budget
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
                    {accountUsage.map(a => {
                      const recs = a.reconciliations || [];
                      const last = recs.length ? recs[recs.length - 1] : null;
                      const displayBal = last ? last.actual : a.accountBudget;
                      const drift = last ? last.delta : 0;
                      return (
                        <div key={a.id} style={{ background: "#141414", borderRadius: 9, padding: "14px 16px", border: last && Math.abs(drift) > 1 ? "1px solid rgba(245,158,11,.3)" : "1px solid #222" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: "#E5E5E5" }}>{a.name}</span>
                            {last
                              ? <span style={{ fontSize: 10, color: "#4ADE80", letterSpacing: .3 }}>✓ verified</span>
                              : <span style={{ fontSize: 10, color: "#555" }}>estimated</span>}
                          </div>
                          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, fontWeight: 700, color: displayBal >= 0 ? "#fff" : "#F87171", marginBottom: 4 }}>{fmt(displayBal)}</div>
                          {last && (
                            <div style={{ fontSize: 10, color: "#666" }}>
                              <span>verified {new Date(last.ts).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' })}</span>
                              {Math.abs(drift) > 0.01 && <span style={{ color: drift < 0 ? "#F87171" : "#FBBF24", marginLeft: 6 }}>Δ {fmt(drift)}</span>}
                            </div>
                          )}
                          {!last && <div style={{ fontSize: 10, color: "#555" }}>system estimate</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #2a2a2a", display: "flex", justifyContent: "flex-end" }}>
                    <button onClick={() => setActiveSection('accounts')} style={{ background: "none", border: "none", color: "#4A90D9", fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>Reconcile accounts →</button>
                  </div>
                </div>
              )}
            </>)}

            {/* ============ OPERATIONS SECTION ============ */}
            {activeSection === 'operations' && (<>
            {/* TABLE */}
            <div style={{ background: "#1A1A1A", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,.08)", marginBottom: 28 }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", minWidth: 950 + workers.length * 160 }}>
                  <colgroup>
                    <col style={{ width: 224 }} /><col style={{ width: 170 }} /><col style={{ width: 140 }} /><col style={{ width: 110 }} /><col style={{ width: 70 }} /><col style={{ width: 90 }} /><col style={{ width: 110 }} /><col style={{ width: 46 }} />
                    {workers.map(w => <col key={w.id} style={{ width: 150 }} />)}
                    <col style={{ width: 40 }} />
                  </colgroup>
                  <thead>
                    <tr style={{ background: "#444", color: "#fff" }}>
                      <th className="scol" style={{ padding: 0, background: "#131313" }}></th>
                      <th colSpan={6} style={{ padding: 0 }}></th>
                      <th style={{ padding: "6px 4px", fontSize: 11, fontWeight: 600, textAlign: "right", whiteSpace: "nowrap", verticalAlign: "top" }}>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "rgba(255,255,255,.7)", fontSize: 11, letterSpacing: .5 }}>Total Revenue Per Person:<button onClick={() => setShowAddWorker(true)} style={{ background: "rgba(255,255,255,.15)", border: "none", color: "#fff", borderRadius: 4, padding: "1px 8px", cursor: "pointer", fontSize: 14, fontWeight: 600, marginLeft: 2 }}><Icon name="plus" size={15} /></button></span>
                      </th>
                      {workers.map((w, wIdx) => { const c = wc(w); const t = workerTotals[w.id] || { paid: 0, pending: 0 }; return (
                        <th key={w.id} className="worker-th" draggable onDragStart={e => onWorkerDragStart(e, wIdx)} onDragOver={onWorkerDragOver} onDrop={e => onWorkerDrop(e, wIdx)} onDragEnd={() => setDragWorkerIdx(null)} style={{ padding: "6px 6px 5px", background: c.bg, borderLeft: `2px solid ${c.border}`, borderRight: `1px solid ${c.border}`, textAlign: "center", position: "relative", verticalAlign: "middle", opacity: dragWorkerIdx === wIdx ? 0.4 : 1, outline: dragWorkerIdx !== null && dragWorkerIdx !== wIdx ? `2px dashed ${c.border}` : 'none', transition: 'opacity .2s' }}>
                          <button onClick={() => removeWorker(w.id)} style={{ position: "absolute", top: 2, right: 3, background: "none", border: "none", cursor: "pointer", color: c.text, opacity: .3 }}><Icon name="trash" size={12} /></button>
                          <div style={{ fontWeight: 700, fontSize: 13, fontStyle: "italic", color: c.text }}>{w.name}</div>
                          <div style={{ fontSize: 9, color: c.text, opacity: .6, fontWeight: 400, lineHeight: 1.2, marginBottom: 3 }}>{w.role}</div>
                          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, fontSize: 15, color: c.text }}>{fmt(t.paid)}</div>
                          {t.pending > 0 && <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: c.text, opacity: .55 }}>+{fmt(t.pending)} pending</div>}
                        </th>
                      ); })}
                      <th style={{ background: "#444" }}></th>
                    </tr>
                    
                    <tr style={{ background: "#1A1A1A", color: "#fff" }}>
                      <th className="scol" style={{ padding: 0, background: "#141414" }}>
                        <div style={{ display: "flex", alignItems: "center", height: "100%" }}>
                          <div style={{ width: 36, flexShrink: 0, display: "flex", justifyContent: "center" }}>
                            <input type="checkbox" checked={transactions.length > 0 && selectedTx.size === transactions.length} onChange={toggleAllTx} style={{ width: 13, height: 13, cursor: "pointer", accentColor: "#4A90D9" }} title="Select all" />
                          </div>
                          <div style={{ width: 30, flexShrink: 0, textAlign: "center", fontSize: 11, color: "#888" }}>#</div>
                          <div style={{ flex: 1, padding: "10px 6px", fontSize: 12, textAlign: "left" }}>Clients</div>
                        </div>
                      </th>
                      <th style={{ padding: "10px 6px", fontSize: 12, textAlign: "left" }}>Our service</th>
                      <th style={{ padding: "10px 6px", fontSize: 12, textAlign: "left" }}>Account</th>
                      <th style={{ padding: "10px 6px", fontSize: 12, textAlign: "right" }}>Payment</th>
                      <th style={{ padding: "10px 6px", fontSize: 12, textAlign: "center" }}>Date</th>
                      <th style={{ padding: "10px 6px", fontSize: 12, textAlign: "right" }}>Cost/tax</th>
                      <th style={{ padding: "10px 6px", fontSize: 12, textAlign: "right" }}>Agency REV</th>
                      <th style={{ padding: "10px 6px", fontSize: 10, textAlign: "center" }}>Inv.</th>
                      {workers.map(w => { const c = wc(w); return (<th key={w.id} style={{ padding: "8px 6px", background: c.bg, borderLeft: `2px solid ${c.border}`, borderRight: `1px solid ${c.border}` }}></th>); })}
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {transactions.map((t, i) => {
                      const diff = rowDiff(t); const isInvalid = Math.abs(diff) > 0.01;
                      const isReceived = t.status === 'received';
                      return (
                        <tr key={t.id} className={`tx-row ${isInvalid ? "invalid" : isReceived ? "received" : ""}`} draggable onDragStart={() => onTxDragStart(i)} onDragOver={(e) => onTxDragOver(e, i)} onDrop={() => onTxDrop(i)} style={{ borderBottom: `1px solid ${isReceived && !isInvalid ? "#1f3d2a" : "#2a2a2a"}`, opacity: dragTxIdx === i ? 0.4 : 1 }}>
                          <td className="scol" style={{ padding: 0, background: isInvalid ? "#1e1616" : isReceived ? "#15291b" : "#141414" }}>
                            <div style={{ display: "flex", alignItems: "flex-start" }}>
                              <div style={{ width: 36, flexShrink: 0, textAlign: "center", padding: "2px 0" }}>
                                <button className="status-btn" onClick={() => { const next = isReceived ? 'pending' : 'received'; updateTx(t.id, 'status', next); logAction(next === 'received' ? 'Payment confirmed' : 'Payment unconfirmed', [t.client, parseNum(t.payment) > 0 ? fmt(parseNum(t.payment)) : '', resolveAccount(t.platforma) ? 'acc: ' + resolveAccount(t.platforma) : ''].filter(Boolean).join(' · ')); }} title={isReceived ? "Received — click to undo" : "Not confirmed — excluded from stats"}>
                                  <svg width="15" height="15" viewBox="0 0 24 24" style={{ display: "block" }}><circle cx="12" cy="12" r="8" fill={isReceived ? "#16A34A" : "none"} stroke={isReceived ? "#16A34A" : "#bbb"} strokeWidth="2" />{isReceived && <path d="M8.5 12l2.5 2.5 4.5-5" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />}</svg>
                                </button>
                                <DragHandle />
                                <input type="checkbox" checked={selectedTx.has(t.id)} onChange={() => toggleSelectTx(t.id)} style={{ width: 13, height: 13, cursor: "pointer", accentColor: "#4A90D9" }} />
                                <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, fontWeight: 600, color: diff > 0 ? "#16A34A" : diff < 0 ? "#DC2626" : "#999", marginTop: 1 }}>{isInvalid ? (diff > 0 ? `+${diff.toFixed(2)}` : diff.toFixed(2)) : "✓"}</div>
                              </div>
                              <div style={{ width: 30, flexShrink: 0, padding: "6px 2px", fontSize: 12, color: "#999", textAlign: "center" }}>{i + 1}</div>
                              <div style={{ flex: 1, minWidth: 0, padding: "2px" }}>
                                <EditableCell value={t.client} onChange={v => updateTx(t.id, "client", v)} />
                                <CommentCell value={t.comment} onChange={v => updateTx(t.id, "comment", v)} />
                              </div>
                            </div>
                          </td>
                          <td style={{ padding: "2px" }}>
                            <input list="products-list" value={t.service || ""} onChange={e => updateTx(t.id, "service", e.target.value)} style={{ width: "100%", boxSizing: "border-box", padding: "4px", border: "1px solid transparent", borderRadius: 3, fontFamily: "'DM Sans',sans-serif", fontSize: 13, outline: "none", transition: "border .2s", background: "transparent" }} onFocus={e => e.target.style.border="1px solid #4A90D9"} onBlur={e => e.target.style.border="1px solid transparent"} placeholder="Service" />
                          </td>
                          <td style={{ padding: "2px" }}>
                             <input list="accounts-list" value={t.platforma || ""} onChange={e => updateTx(t.id, "platforma", e.target.value)} style={{ width: "100%", boxSizing: "border-box", padding: "4px", border: "1px solid transparent", borderRadius: 3, fontFamily: "'DM Sans',sans-serif", fontSize: 13, outline: "none", transition: "border .2s", background: "transparent" }} onFocus={e => e.target.style.border="1px solid #4A90D9"} onBlur={e => e.target.style.border="1px solid transparent"} placeholder="Account" />
                          </td>
                          <td style={{ padding: "2px" }}><EditableCell value={t.payment} onChange={v => updateTx(t.id, "payment", v)} type="number" mono style={{ textAlign: "right" }} /></td>
                          <td style={{ padding: "2px" }}><EditableCell value={t.date} onChange={v => updateTx(t.id, "date", v)} isDate={true} activeMonthIdx={currentMonth} style={{ textAlign: "center" }} /></td>
                          <td style={{ padding: "2px" }}><EditableCell value={t.costTax} onChange={v => updateTx(t.id, "costTax", v)} type="number" mono style={{ textAlign: "right" }} /></td>
                          <td style={{ padding: "2px" }}><EditableCell value={t.agencyRev} onChange={v => updateTx(t.id, "agencyRev", v)} type="number" mono style={{ textAlign: "right" }} /></td>
                          <td style={{ padding: "2px 4px", textAlign: "center" }}>
                            {t.invoice ? (<div style={{ display: "flex", alignItems: "center", gap: 2, justifyContent: "center" }}><button className="invoice-btn" onClick={() => downloadInvoice(t.invoice)} title={t.invoice.name} style={{ color: "#16A34A", display: "inline-flex" }}><Icon name="download" size={14} /></button><button className="invoice-btn" onClick={() => updateTx(t.id, "invoice", null)} style={{ color: "#DC2626", display: "inline-flex" }}><Icon name="trash" size={13} /></button></div>) : (<button className="invoice-btn" onClick={() => triggerInvoiceUpload(t.id)} style={{ color: "#999", display: "inline-flex" }}><Icon name="attach" size={14} /></button>)}
                          </td>
                          {workers.map(w => { const c = wc(w); const wp = t.workerPay?.[w.id] || { amount: 0, paid: false, comment: "", advance: 0 }; const adv = parseNum(wp.advance); const net = parseNum(wp.amount) - adv; return (
                            <td key={w.id} style={{ padding: "2px 4px", background: c.bgLight, borderLeft: `2px solid ${c.border}`, borderRight: `1px solid ${c.border}` }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                <div style={{ flex: 1 }}><EditableCell value={wp.amount} onChange={v => updateWorkerPay(t.id, w.id, "amount", v)} type="number" mono style={{ textAlign: "right", fontSize: 12, color: wp.paid ? c.text : "#555" }} /></div>
                                <input type="checkbox" className="checkbox-paid" checked={wp.paid} onChange={e => updateWorkerPay(t.id, w.id, "paid", e.target.checked)} />
                              </div>
                              {/* Advance deduction row */}
                              <div style={{ display: "flex", alignItems: "center", gap: 3, marginTop: 1 }}>
                                <span style={{ fontSize: 8, color: c.text, opacity: .4, whiteSpace: "nowrap" }}>adv:</span>
                                <div style={{ flex: 1 }}><EditableCell value={wp.advance || 0} onChange={v => updateWorkerPay(t.id, w.id, "advance", v)} type="number" mono style={{ textAlign: "right", fontSize: 10, color: adv > 0 ? "#F87171" : "#666" }} /></div>
                              </div>
                              {adv > 0 && (
                                <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: c.text, opacity: .7, textAlign: "right", paddingRight: 2 }}>= {fmt(net)}</div>
                              )}
                              {wp.comment ? (
                                <EditableCell value={wp.comment} onChange={v => updateWorkerPay(t.id, w.id, "comment", v)} style={{ fontSize: 10, color: c.text, opacity: .7, padding: "1px 4px" }} />
                              ) : (
                                <div onClick={() => updateWorkerPay(t.id, w.id, "comment", " ")} style={{ fontSize: 9, color: c.text, opacity: .25, cursor: "text", padding: "1px 4px", textAlign: "center", userSelect: "none" }}>+ note</div>
                              )}
                            </td>
                          ); })}
                          <td style={{ padding: "2px 4px", textAlign: "center" }}>
                            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                              <button className="row-delete" onClick={() => duplicateTxToNext(t)} title="Copy to next month" style={{ opacity: 0, border: "none", background: "none", cursor: "pointer", color: "#4A90D9", transition: "opacity .15s", display: "flex" }}><Icon name="copy" size={14} /></button>
                              <button className="row-delete" onClick={() => removeTx(t.id)} title="Delete" style={{ opacity: 0, border: "none", background: "none", cursor: "pointer", color: "#DC2626", transition: "opacity .15s", display: "flex" }}><Icon name="trash" size={15} /></button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{ background: "#222", fontWeight: 600 }}>
                      <td className="scol" style={{ padding: "10px 6px 10px 72px", fontSize: 13, background: "#1e1e1e" }}>TOTALS <span style={{ fontSize: 10, fontWeight: 400, color: "#666" }}>(confirmed only)</span></td>
                      <td></td><td></td>
                      <td style={{ padding: "10px 6px", textAlign: "right" }}>
                        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 13 }}>{fmt(totalPayment)}</div>
                        {pendingPayment > 0 && <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: "#A16207", fontWeight: 500 }}>+{fmt(pendingPayment)} pend.</div>}
                      </td><td></td>
                      <td style={{ padding: "10px 6px", fontFamily: "'JetBrains Mono',monospace", fontSize: 13, textAlign: "right" }}>{fmt(totalCosts)}</td>
                      <td style={{ padding: "10px 6px", textAlign: "right" }}>
                        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 13 }}>{fmt(totalRev)}</div>
                        {pendingRev > 0 && <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: "#A16207", fontWeight: 500 }}>+{fmt(pendingRev)} pend.</div>}
                      </td><td></td>
                      {workers.map(w => { const c = wc(w); const t = workerTotals[w.id] || { paid: 0, pending: 0 }; return (<td key={w.id} style={{ padding: "10px 6px", background: c.bg, fontFamily: "'JetBrains Mono',monospace", fontSize: 13, textAlign: "center", color: c.text }}>{fmt(t.paid + t.pending)}</td>); })}
                      <td></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
              <div style={{ padding: "12px 16px", borderTop: "1px solid #2a2a2a", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <button className="btn btn-primary" onClick={addTransaction}><Icon name="plus" size={14} /> Add transaction</button>
              </div>
            </div>

            {/* EXPENSES & TRANSFERS GRID */}

                         <th style={{ padding: "10px 6px", fontSize: 12, color: "#9a9a9a", textAlign: "center" }}>Date</th>

                           </td>
                           <td style={{ padding: "8px 6px", fontSize: 12, textAlign: "center", fontFamily: "'JetBrains Mono',monospace" }}><EditableCell value={e.method} onChange={v => { const x = [...expenses]; x[i].method = v; setExpenses(x); }} /></td>
                           <td style={{ padding: "8px 6px", fontSize: 12, textAlign: "center" }}>
                             <EditableCell value={e.date} onChange={v => {
                                const newExps = [...expenses];
                                newExps[i].date = v;
                                setExpenses(newExps);
                             }} isDate={true} activeMonthIdx={currentMonth} />
                           </td>
                           <td style={{ padding: "8px 6px", fontSize: 13, textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, color: "#DC2626" }}><EditableCell value={e.cost} onChange={v => { const x = [...expenses]; x[i].cost = v; setExpenses(x); }} type="number" mono style={{textAlign: "right"}} /></td>
                           <td style={{ padding: "4px 6px", textAlign: "center" }}>
                             <button onClick={() => { const x=[...expenses]; x[i].recurring=!e.recurring; setExpenses(x); }} title={e.recurring ? "Monthly (click to remove)" : "One-time (click to make monthly)"} style={{ border: "none", background: e.recurring ? "rgba(74,144,217,.12)" : "none", borderRadius: 4, cursor: "pointer", padding: "4px 6px", color: e.recurring ? "#4A90D9" : "#ccc", display: "inline-flex" }}><Icon name="repeat" size={14} /></button>
                           </td>
                           <td style={{ padding: "4px 6px", textAlign: "center" }}>
                             <button onClick={() => { const x=[...expenses]; x[i].costType = x[i].costType === 'client' ? '' : 'client'; setExpenses(x); }} title={e.costType === 'client' ? 'Client cost — click to make agency' : 'Agency cost — click to make client'} style={{ border: "none", background: e.costType === 'client' ? "rgba(147,51,234,.12)" : "rgba(74,144,217,.1)", borderRadius: 4, cursor: "pointer", fontSize: 10, padding: "2px 6px", color: e.costType === 'client' ? "#9333EA" : "#4A90D9", whiteSpace: "nowrap" }}>

                             {e.costType === 'client' && (

                             )}
                           </td>
                           <td style={{ padding: "4px 6px", textAlign: "center" }}>
                             <select value={e.workerLink || ""} onChange={ev => { const x=[...expenses]; x[i].workerLink=ev.target.value; setExpenses(x); }} style={{ fontSize: 11, border: "1px solid #333", borderRadius: 4, padding: "2px 4px", background: e.workerLink ? "rgba(52,211,153,.12)" : "#222", color: e.workerLink ? "#34D399" : "#666", maxWidth: 110, cursor: "pointer" }}>
                               <option value="">— not salary —</option>
                               {workers.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}

                           </td>
                           <td style={{ padding: "8px 6px", textAlign: "center", display: "flex", gap: 8, justifyContent: "center" }}>

                         </tr>

                     </tbody>
                   </table>
                 </div>
                 <div style={{ padding: "12px 16px", borderTop: "1px solid #2a2a2a" }}>
                   <button className="btn btn-primary" onClick={() => { setEditExpense(null); setNewExpense({ service: "", persona: "", method: "USDT", date: "", cost: 0, recurring: false, workerLink: "", costType: "", clientName: "" }); setShowAddExpense(true); }}><Icon name="plus" size={14} /> Add expense</button>
                 </div>
               </div>

               {/* TRANSFERS */}
               <div style={{ background: "#1A1A1A", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,.08)", height: "fit-content" }}>

                   <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>Internal transfers between accounts</div>
                 </div>
                 <div style={{ overflowX: "auto" }}>
                   <table style={{ width: "100%", minWidth: 300 }}>
                     <thead>
                       <tr style={{ background: "#222" }}>
                         <th style={{ padding: "10px 6px", fontSize: 11, color: "#9a9a9a", textAlign: "left" }}>From → To</th>
                         <th style={{ padding: "10px 6px", fontSize: 11, color: "#9a9a9a", textAlign: "right" }}>Amount</th>
                         <th style={{ padding: "10px 6px", fontSize: 11, color: "#9a9a9a", textAlign: "center" }}>Actions</th>
                       </tr>
                     </thead>
                     <tbody>
                       {transfers.map(tr => (
                         <tr key={tr.id} style={{ borderBottom: "1px solid #2a2a2a" }}>

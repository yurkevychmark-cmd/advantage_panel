                              <button onClick={() => removeTransfer(tr.id)} style={{ border: "none", background: "none", cursor: "pointer", fontSize: 12 }}><Icon name="trash" size={14} /></button>
                           </td>
                         </tr>
                       ))}
                       {transfers.length === 0 && <tr><td colSpan={3} style={{ padding: 16, textAlign: "center", fontSize: 12, color: "#999" }}>No transfers</td></tr>}
                     </tbody>
                   </table>
                 </div>
                 <div style={{ padding: "12px 16px", borderTop: "1px solid #2a2a2a" }}>
                   <button className="btn btn-secondary" onClick={() => setShowTransfer(true)}><Icon name="transfer" size={14} /> Add transfer</button>
                 </div>
               </div>

            </div>

            {/* PERSONAL INVESTMENTS */}
            {(() => {
              const allEntries = [...investments, ...personalExpInvestments];
              const totalInvested = allEntries.reduce((s, i) => s + parseNum(i.amount), 0);
              const byPerson = {};
              allEntries.forEach(i => { byPerson[i.person] = (byPerson[i.person] || 0) + parseNum(i.amount); });
              return (
                <div style={{ background: "#1A1A1A", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,.08)", marginBottom: 28 }}>
                  <div style={{ padding: "14px 20px", borderBottom: "1px solid #2a2a2a", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <h2 style={{ fontSize: 15, fontWeight: 700, color: "#E5E5E5" }}>Founder personal investments</h2>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Top-ups from personal accounts · <span style={{ color: "#4ADE80", fontWeight: 600 }}>auto</span> = pulled from expenses</div>
                    </div>
                    <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                      {Object.entries(byPerson).map(([p, amt]) => (
                        <div key={p} style={{ fontSize: 12, color: "#a5a5a5" }}><span style={{ fontWeight: 600 }}>{p}:</span> <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: "#4A90D9" }}>{fmt(amt)}</span></div>
                      ))}
                      <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, fontSize: 15, color: "#1A1A1A" }}>Total: {fmt(totalInvested)}</span>
                    </div>
                  </div>
                  {/* Personal account balance: received − expenses = remaining */}
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", minWidth: 600 }}>
                      <colgroup><col style={{ width: 160 }} /><col style={{ width: 110 }} /><col style={{ width: 100 }} /><col style={{ width: 90 }} /><col /><col style={{ width: 50 }} /></colgroup>
                      <thead>
                        <tr style={{ background: "#222" }}>
                          <th style={{ padding: "9px 10px", fontSize: 12, color: "#9a9a9a", textAlign: "left" }}>Account / Founder</th>
                          <th style={{ padding: "9px 10px", fontSize: 12, color: "#9a9a9a", textAlign: "right" }}>Amount</th>
                          <th style={{ padding: "9px 10px", fontSize: 12, color: "#9a9a9a", textAlign: "center" }}>Method</th>
                          <th style={{ padding: "9px 10px", fontSize: 12, color: "#9a9a9a", textAlign: "center" }}>Date</th>
                          <th style={{ padding: "9px 10px", fontSize: 12, color: "#9a9a9a", textAlign: "left" }}>Comment / Service</th>
                          <th style={{ padding: "9px 10px", fontSize: 12, color: "#9a9a9a", textAlign: "center" }}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {/* Auto-detected rows from personal expenses — fully editable (edits underlying expense) */}
                        {personalExpInvestments.map(inv => {
                          const expIdx = expenses.findIndex(ex => ex.id === inv.id.replace('auto_', ''));
                          const upd = (field, val) => { if (expIdx < 0) return; const x = [...expenses]; x[expIdx] = { ...x[expIdx], [field]: val }; setExpenses(x); };
                          return (
                            <tr key={inv.id} style={{ borderBottom: "1px solid #2a2a2a", background: "#15241a" }}>
                              <td style={{ padding: "7px 10px", fontSize: 13, display: "flex", alignItems: "center", gap: 4 }}>
                                <span style={{ fontSize: 9, background: "#4ADE80", color: "#166534", borderRadius: 3, padding: "1px 5px", fontWeight: 700, letterSpacing: .3, flexShrink: 0 }}>auto</span>
                                <EditableCell value={inv.person} onChange={v => upd("persona", v)} style={{ fontSize: 13 }} />
                              </td>
                              <td style={{ padding: "7px 10px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, color: "#4A90D9" }}>
                                <EditableCell value={inv.amount} onChange={v => upd("cost", parseNum(v))} type="number" mono style={{ textAlign: "right" }} />
                              </td>
                              <td style={{ padding: "7px 10px", textAlign: "center" }}>
                                <EditableCell value={inv.method} onChange={v => upd("method", v)} style={{ textAlign: "center", fontSize: 12 }} />
                              </td>
                              <td style={{ padding: "7px 10px", textAlign: "center" }}>
                                <EditableCell value={inv.date} onChange={v => upd("date", v)} isDate={true} activeMonthIdx={currentMonth} style={{ textAlign: "center" }} />
                              </td>
                              <td style={{ padding: "7px 10px" }}>
                                <EditableCell value={inv.comment || ""} onChange={v => upd("service", v)} style={{ fontSize: 12, color: "#9a9a9a" }} />
                              </td>
                              <td style={{ padding: "7px 10px", textAlign: "center", fontSize: 10, color: "#bbb" }}>←exp</td>
                            </tr>
                          );
                        })}
                        {/* Manual entries */}
                        {investments.map((inv, ii) => (
                          <tr key={inv.id} style={{ borderBottom: "1px solid #2a2a2a" }}>
                            <td style={{ padding: "7px 10px" }}><EditableCell value={inv.person} onChange={v => { const x=[...investments]; x[ii].person=v; setInvestments(x); }} /></td>

                            <td style={{ padding: "7px 10px", textAlign: "center" }}><EditableCell value={inv.method} onChange={v => { const x=[...investments]; x[ii].method=v; setInvestments(x); }} style={{ textAlign:"center", fontSize:12 }} /></td>
                            <td style={{ padding: "7px 10px", textAlign: "center" }}><EditableCell value={inv.date} onChange={v => { const x=[...investments]; x[ii].date=v; setInvestments(x); }} isDate={true} activeMonthIdx={currentMonth} style={{ textAlign:"center" }} /></td>
                            <td style={{ padding: "7px 10px" }}><EditableCell value={inv.comment || ""} onChange={v => { const x=[...investments]; x[ii].comment=v; setInvestments(x); }} style={{ fontSize:12, color:"#9a9a9a" }} /></td>
                            <td style={{ padding: "7px 10px", textAlign: "center" }}><button onClick={() => removeInvestment(inv.id)} style={{ border:"none", background:"none", cursor:"pointer", fontSize:14 }}><Icon name="trash" size={14} /></button></td>
                          </tr>
                        ))}
                        {allEntries.length === 0 && <tr><td colSpan={6} style={{ padding: 16, textAlign: "center", color: "#bbb", fontSize: 13 }}>No entries · auto-rows appear from non-agency expenses</td></tr>}
                      </tbody>
                    </table>
                  </div>
                  <div style={{ padding: "10px 16px", borderTop: "1px solid #2a2a2a" }}>
                    <button className="btn btn-primary" onClick={() => setShowAddInvestment(true)}><Icon name="plus" size={14} /> Add investment</button>
                  </div>
                </div>
              );
            })()}

            {/* BULK ACTIONS & EXPORT */}
            <div style={{ background: "#1A1A1A", borderRadius: 10, padding: "16px 20px", boxShadow: "0 2px 12px rgba(0,0,0,.08)", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
               <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#a5a5a5" }}>Selected: {selectedTx.size} transactions, {selectedExp.size} expenses</span>
                  <select className="bulk-select" value={bulkTargetMonth} onChange={(e) => setBulkTargetMonth(e.target.value)}>
                     {getMonthOptions()}
                  </select>
                  <button className="btn btn-action" onClick={() => handleBulkAction('copy')} disabled={selectedTx.size === 0 && selectedExp.size === 0}><Icon name="copy" size={13} /> Copy to</button>
                  <button className="btn btn-action" onClick={() => handleBulkAction('move')} disabled={selectedTx.size === 0 && selectedExp.size === 0} style={{color: "#DC2626"}}><Icon name="transfer" size={13} /> Move to</button>
               </div>
               
               <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button className="btn btn-secondary" onClick={exportSelected} style={{ fontSize: 13 }}><Icon name="download" size={14} /> Export</button>
                  <button className="btn btn-secondary" onClick={() => importInputRef.current?.click()} style={{ fontSize: 13 }}><Icon name="upload" size={14} /> Import JSON</button>
               </div>
            </div>
            </>)}

            {/* ============ TEAM SECTION ============ */}
            {activeSection === 'team' && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>

                  <button className="btn btn-primary" onClick={() => setShowAddWorker(true)}><Icon name="plus" size={14} /> Add team member</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 18 }}>
                  {workers.map(w => {
                    const c = wc(w);
                    const fields = [
                      { key: 'role', icon: 'role', label: 'Role' },
                      { key: 'dob', icon: 'cake', label: 'Date of birth' },
                      { key: 'email', icon: 'mail', label: 'Email' },
                      { key: 'phone', icon: 'phone', label: 'Phone' },
                      { key: 'requisites', icon: 'card', label: 'Bank details' },
                      { key: 'telegram', icon: 'send', label: 'Telegram' },
                    ];
                    return (
                      <div key={w.id} style={{ background: "#1A1A1A", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)", overflow: "hidden" }}>

                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{ width: 44, height: 44, borderRadius: "50%", background: c.text, color: c.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700 }}>{(w.name || '?').charAt(0).toUpperCase()}</div>
                            <div>
                              <div style={{ fontSize: 16, fontWeight: 700, color: c.text }}>{w.name}</div>
                              <div style={{ fontSize: 11, color: c.text, opacity: .7 }}>{w.role || 'no role'}</div>
                            </div>
                          </div>
                          <button onClick={() => { if(window.confirm(`Delete ${w.name}?`)) removeWorker(w.id); }} style={{ background: "rgba(0,0,0,.1)", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, padding: "4px 8px", color: c.text }}><Icon name="trash" size={14} /></button>
                        </div>
                        <div style={{ padding: "14px 18px" }}>
                          {fields.map(f => (
                            <div key={f.key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0", borderBottom: "1px solid #262626" }}>
                              <span style={{ width: 20, display: "flex", justifyContent: "center", flexShrink: 0, color: "#aaa" }}><Icon name={f.icon} size={15} /></span>
                              <span style={{ fontSize: 11, color: "#999", width: 95, flexShrink: 0 }}>{f.label}</span>
                              <div style={{ flex: 1 }}>
                                <EditableCell value={w[f.key] || ""} onChange={v => updateWorkerField(w.id, f.key, v)} style={{ fontSize: 13, color: "#E5E5E5" }} />
                              </div>
                            </div>
                          ))}

                            <div style={{ fontSize: 11, color: "#999", marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}><Icon name="note" size={14} /> Notes</div>

                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {workers.length === 0 && <div style={{ color: "#999", padding: 24 }}>No team members yet. Add the first.</div>}
                </div>
              </div>
            )}

            {/* ============ ACCOUNTS SECTION ============ */}
            {activeSection === 'accounts' && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <div style={{ fontSize: 13, color: "#9a9a9a" }}>Agency payment accounts · turnover across all months · reconcile to match real balances</div>
                  <button className="btn btn-primary" onClick={() => { setEditAccount(null); setNewAccountForm({name:"", owner:"", limit:10000}); setShowAddAccount(true); }}><Icon name="plus" size={14} /> Add account</button>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16, marginBottom: 36 }}>

                          <div>
                            <div style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{a.name}</div>

                        </div>
                        <div style={{ background: "rgba(255,255,255,.1)", borderRadius: 4, height: 8, marginBottom: 6, overflow: "hidden" }}>

                        <div style={{ fontSize: 10, color: over ? "#F87171" : "rgba(255,255,255,.4)", marginBottom: 8 }}>{over ? `EXCEEDED by ${fmt(a.used - a.limit)}` : `Turnover left: ${fmt(a.remaining)}`}</div>
                        <div style={{ borderTop: "1px solid rgba(255,255,255,.1)", paddingTop: 8, display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                          <span style={{ color: "rgba(255,255,255,.5)" }}>System balance:</span>
                          <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: a.accountBudget >= 0 ? "#4ADE80" : "#F87171" }}>{fmt(a.accountBudget)}</span>
                        </div>
                        {/* Reconciliation */}
                        {(() => {
                          const recs = a.reconciliations || [];
                          const last = recs.length ? recs[recs.length - 1] : null;
                          return (
                            <div style={{ borderTop: "1px solid rgba(255,255,255,.1)", marginTop: 8, paddingTop: 8 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                                <span style={{ color: "rgba(255,255,255,.5)" }}>Verified balance:</span>
                                {last
                                  ? <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: "#fff" }}>{fmt(last.actual)}</span>
                                  : <span style={{ fontSize: 11, color: "#666" }}>not reconciled</span>}
                              </div>
                              {last && Math.abs(last.delta) > 0.01 && (
                                <div style={{ fontSize: 10, color: last.delta < 0 ? "#F87171" : "#FBBF24", marginTop: 3 }}>
                                  Δ {fmt(last.delta)} found on {new Date(last.ts).toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: '2-digit' })}
                                </div>
                              )}
                              <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                                <button onClick={() => { setReconcileAccount({ id: a.id, name: a.name, computed: a.accountBudget }); setReconcileForm({ actual: Math.round(a.accountBudget * 100) / 100, note: "" }); }} style={{ flex: 1, padding: "6px", background: "rgba(74,144,217,.15)", border: "1px solid rgba(74,144,217,.35)", borderRadius: 6, color: "#7db8f0", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>Reconcile</button>
                                {recs.length > 0 && <button onClick={() => setExpandedRec(expandedRec === a.id ? null : a.id)} style={{ padding: "6px 10px", background: "rgba(255,255,255,.06)", border: "1px solid #2a2a2a", borderRadius: 6, color: "#9a9a9a", fontSize: 11, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>History ({recs.length})</button>}
                              </div>
                              {expandedRec === a.id && recs.length > 0 && (
                                <div style={{ marginTop: 8, borderTop: "1px solid #2a2a2a", paddingTop: 6, maxHeight: 160, overflowY: "auto" }}>
                                  {recs.slice().reverse().map(r => (
                                    <div key={r.id} style={{ fontSize: 10, color: "#9a9a9a", padding: "4px 0", borderBottom: "1px solid #222" }}>
                                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                                        <span>{new Date(r.ts).toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: '2-digit' })} {new Date(r.ts).toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' })}</span>
                                        <span style={{ fontFamily: "'JetBrains Mono',monospace", color: r.delta === 0 ? "#4ADE80" : Math.abs(r.delta) > 0 ? "#FBBF24" : "#9a9a9a" }}>Δ {fmt(r.delta)}</span>
                                      </div>
                                      <div style={{ fontFamily: "'JetBrains Mono',monospace", color: "#666", marginTop: 1 }}>system {fmt(r.computed)} → real {fmt(r.actual)}</div>
                                      {r.note && <div style={{ color: "#777", marginTop: 1, fontStyle: "italic" }}>{r.note}</div>}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })()}
                      </div>
                    );
                  })}
                  {accounts.length === 0 && <div style={{ color: "#999", padding: 24 }}>No accounts.</div>}
                </div>

                {/* Personal accounts balance */}
                {Object.keys(personalAccountStats).length > 0 && (
                  <div style={{ background: "#1A1A1A", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)", overflow: "hidden" }}>
                    <div style={{ padding: "16px 20px", borderBottom: "1px solid #2a2a2a" }}>
                      <h2 style={{ fontSize: 15, fontWeight: 700, color: "#E5E5E5" }}>Personal account balance</h2>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Non-agency accounts · received minus spent (all months)</div>
                    </div>
                    <table style={{ width: "100%" }}>
                      <thead>
                        <tr style={{ background: "#222" }}>
                          <th style={{ padding: "9px 16px", fontSize: 12, color: "#9a9a9a", textAlign: "left" }}>Account</th>
                          <th style={{ padding: "9px 16px", fontSize: 12, color: "#9a9a9a", textAlign: "right" }}>Received</th>
                          <th style={{ padding: "9px 16px", fontSize: 12, color: "#9a9a9a", textAlign: "right" }}>Spent</th>
                          <th style={{ padding: "9px 16px", fontSize: 12, color: "#9a9a9a", textAlign: "right" }}>Balance</th>
                        </tr>
                      </thead>
                      <tbody>
                        {Object.entries(personalAccountStats).map(([name, s]) => {
                          const bal = s.received - s.spent;
                          return (
                            <tr key={name} style={{ borderBottom: "1px solid #262626" }}>
                              <td style={{ padding: "9px 16px", fontSize: 13, fontWeight: 600, color: "#E5E5E5" }}>{name}</td>
                              <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontSize: 12, color: "#16A34A" }}>{fmt(s.received)}</td>
                              <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontSize: 12, color: "#DC2626" }}>{fmt(s.spent)}</td>
                              <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontSize: 13, fontWeight: 700, color: bal >= 0 ? "#16A34A" : "#DC2626" }}>{fmt(bal)}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}

            {/* ============ JOURNAL SECTION ============ */}
            {activeSection === 'journal' && (
              <div style={{ background: "#1A1A1A", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)", padding: "20px 24px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 16, flexWrap: "wrap" }}>
                  <div style={{ fontSize: 13, color: "#9a9a9a" }}>Full history of platform actions</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input placeholder="Filter..." value={actionLogFilter} onChange={e => setActionLogFilter(e.target.value)} style={{ padding: "7px 12px", border: "1px solid #333", borderRadius: 6, fontSize: 13, outline: "none", width: 200 }} />
                    <button className="btn btn-secondary" style={{ fontSize: 12, color: "#DC2626" }} onClick={() => { if(window.confirm("Clear the entire journal?")) { localStorage.removeItem('adv_action_log'); setActionLogFilter(''); setActiveSection('journal'); } }}>Clear</button>
                  </div>
                </div>
                {(() => {
                  const log = (() => { try { return JSON.parse(localStorage.getItem('adv_action_log') || '[]'); } catch(e) { return []; } })();
                  const filtered = actionLogFilter ? log.filter(e => e.action.toLowerCase().includes(actionLogFilter.toLowerCase()) || new Date(e.ts).toLocaleDateString('uk-UA').includes(actionLogFilter) || (e.detail || '').toLowerCase().includes(actionLogFilter.toLowerCase())) : log;
                  if (filtered.length === 0) return <div style={{ textAlign: "center", color: "#aaa", padding: 40 }}>No records</div>;
                  return (
                    <div>
                      {filtered.map((entry, idx) => {
                        const d = new Date(entry.ts);
                        const dt = d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' · ' + d.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
                        return (
                          <div key={entry.id} style={{ display: "flex", alignItems: "flex-start", gap: 14, padding: "7px 8px", borderRadius: 6, background: idx % 2 ? "#222" : "#181818" }}>
                            <span style={{ fontSize: 11, color: "#aaa", fontFamily: "'JetBrains Mono',monospace", whiteSpace: "nowrap", width: 110, flexShrink: 0, paddingTop: 2 }}>{dt}</span>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <span style={{ fontSize: 13, fontWeight: 600, color: "#E5E5E5" }}>{entry.action}</span>
                              {entry.detail && <span style={{ fontSize: 12, color: "#777", marginLeft: 6 }}>· {entry.detail}</span>}
                            </div>
                            <span style={{ fontSize: 11, color: "#ccc", whiteSpace: "nowrap", flexShrink: 0, paddingTop: 2 }}>{entry.month}</span>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>
            )}

            {/* ============ SETTINGS SECTION ============ */}
            {activeSection === 'settings' && (
              <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                {/* Currency */}
                <div style={{ background: "#1A1A1A", borderRadius: 12, padding: "20px 24px", boxShadow: "0 2px 12px rgba(0,0,0,.08)" }}>
                  <h2 style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 14 }}>Currency converter</h2>
                  <CurrencyConverter />
                </div>
                {/* Products */}
                <div style={{ background: "#1A1A1A", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)", padding: "20px 24px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <h2 style={{ fontSize: 15, fontWeight: 700, color: "#E5E5E5" }}>Products</h2>
                    <button className="btn btn-primary" onClick={() => { setEditProduct(null); setNewProduct({ name: "", color: "#4A90D9", avgPrice: 0 }); setShowAddProduct(true); }}><Icon name="plus" size={14} /> Product</button>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
                    {productStats.map(p => (
                      <div key={p.id} style={{ border: `1px solid ${p.color}33`, borderLeft: `4px solid ${p.color}`, borderRadius: 10, padding: "12px 14px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div style={{ fontWeight: 700, fontSize: 14, color: p.color }}>{p.name}</div>
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => startEditProduct(p)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11 }}><Icon name="edit" size={13} /></button>
                            <button onClick={() => removeProduct(p.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11 }}><Icon name="trash" size={14} /></button>
                          </div>
                        </div>
                        <div style={{ fontSize: 11, color: "#888", marginTop: 6 }}>this mo: <b style={{ color: "#E5E5E5" }}>{p.monthSales}</b> · total: {p.totalSales}</div>
                        {p.avgPrice > 0 && <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>avg {fmt(p.avgPrice)}</div>}
                      </div>
                    ))}
                    {products.length === 0 && <div style={{ color: "#999", fontSize: 13 }}>No products.</div>}
                  </div>
                </div>
                {/* Salary notifications */}
                <div style={{ background: "#1A1A1A", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)", padding: "20px 24px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <h2 style={{ fontSize: 15, fontWeight: 700, color: "#E5E5E5" }}>Salary reminders</h2>
                    <button className="btn btn-secondary" style={{ fontSize: 12 }} onClick={() => { setSalaryNotifyWorkerIds(null); localStorage.removeItem('salary_notify_workers'); }}>↺ Reset (all)</button>
                  </div>
                  <p style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>Who to include in unpaid-salary reminders.</p>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 8 }}>
                    {workers.map(w => {
                      const c = wc(w);
                      const included = salaryNotifyWorkerIds === null || salaryNotifyWorkerIds.includes(w.id);
                      return (
                        <label key={w.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 8, cursor: "pointer", background: included ? c.bgLight : "#222", border: `1px solid ${included ? c.border : "#2a2a2a"}` }}>
                          <input type="checkbox" checked={included} onChange={ev => { const current = salaryNotifyWorkerIds || workers.map(ww => ww.id); const updated = ev.target.checked ? [...current, w.id] : current.filter(id => id !== w.id); setSalaryNotifyWorkerIds(updated); localStorage.setItem('salary_notify_workers', JSON.stringify(updated)); }} style={{ accentColor: c.border }} />
                          <span style={{ fontSize: 13, fontWeight: 600, color: c.text }}>{w.name}</span>
                        </label>
                      );
                    })}
                  </div>
                </div>
                {/* Data */}
                <div style={{ background: "#1A1A1A", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)", padding: "20px 24px" }}>
                  <h2 style={{ fontSize: 15, fontWeight: 700, color: "#E5E5E5", marginBottom: 12 }}>Data</h2>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <button className="btn btn-secondary" onClick={exportSelected}><Icon name="download" size={14} /> Export selected</button>
                    <button className="btn btn-secondary" onClick={() => importInputRef.current?.click()}><Icon name="upload" size={14} /> Import JSON</button>
                  </div>
                </div>
              </div>
            )}

            {/* ============ MECHANICS SECTION ============ */}
            {activeSection === 'mechanics' && (() => {
              const card = { background: "#1A1A1A", border: "1px solid #2a2a2a", borderRadius: 12, padding: "20px 24px" };
              const h = { fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 6, display: "flex", alignItems: "center", gap: 8 };
              const sub = { fontSize: 12.5, color: "#9a9a9a", lineHeight: 1.6 };
              const code = { fontFamily: "'JetBrains Mono',monospace", fontSize: 11.5, background: "#0F0F0F", border: "1px solid #2a2a2a", borderRadius: 6, padding: "8px 10px", color: "#7dd3fc", display: "block", marginTop: 8, whiteSpace: "pre-wrap" };
              const li = { fontSize: 12.5, color: "#bdbdbd", lineHeight: 1.7, marginBottom: 3 };
              const accent = { color: "#4ADE80", fontWeight: 600 };
              const Section = ({ title, children }) => <div style={card}><div style={h}>{title}</div><div>{children}</div></div>;
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 18, maxWidth: 920 }}>
                  <div style={{ ...card, background: "linear-gradient(135deg,#1A1A1A,#161616)" }}>
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 6 }}>How this platform works</div>
                    <div style={sub}>Living documentation of the data model, money-flow logic and feature behaviour. Every time a new feature ships, it gets documented here so the logic stays transparent and transferable.</div>
                  </div>

                  <Section title="Data model">
                    <div style={sub}>Everything lives in Supabase across two tables:</div>
                    <ul style={{ marginTop: 8, paddingLeft: 18 }}>
                      <li style={li}><b style={accent}>global_settings</b> — workers (with profiles), payment accounts, products. Shared across all months.</li>
                      <li style={li}><b style={accent}>monthly_data</b> — one record per month key (<code style={{ fontFamily: "'JetBrains Mono',monospace", color: "#7dd3fc" }}>YYYY-M</code>) holding that month's transactions, expenses, transfers, investments and carryover.</li>
                    </ul>
                    <div style={{ ...sub, marginTop: 8 }}>Changes auto-save to the cloud with a 1.5s debounce. Up to 30 undo states are kept in memory.</div>
                  </Section>

                  <Section title="Transactions & the money equation">
                    <div style={sub}>Each client deal splits the client payment into three parts:</div>
                    <code style={code}>payment = cost/tax + agency REV + Σ(worker salaries)</code>
                    <ul style={{ marginTop: 10, paddingLeft: 18 }}>
                      <li style={li}><b>payment</b> — gross amount the client paid.</li>
                      <li style={li}><b>agency REV</b> — what the agency actually earns (the real revenue metric).</li>
                      <li style={li}><b>cost/tax</b> — fees/taxes that leave on this deal.</li>
                      <li style={li}><b>worker salaries</b> — per-worker amounts assigned in the colored columns.</li>
                    </ul>
                    <div style={{ ...sub, marginTop: 10 }}>The row balance check (left number) must be 0 — if it's red, the split doesn't add up.</div>
                  </Section>

                  <Section title={<span>Confirmed vs pending — <span style={{ color: "#4ADE80" }}>the green circle</span></span>}>
                    <div style={sub}>A deal counts in statistics <b style={accent}>only</b> when marked received (green circle). Until then it's a draft: visible in the table but excluded from Agency Turnover, REV, costs, account turnover, product sales and all annual/monthly stats. Pending sums are shown separately as <span style={{ color: "#A16207" }}>"+X pend."</span> so potential income is still visible without inflating the real numbers.</div>
                  </Section>

                  <Section title="Expenses">
                    <ul style={{ paddingLeft: 18 }}>
                      <li style={li}><b>Account (persona)</b> — which account the money left from.</li>
                      <li style={li}><b>Recur</b> — flags a monthly recurring cost.</li>
                      <li style={li}><b>Type</b> — <span style={{ color: "#4A90D9" }}>agency</span> (counts against agency P&L) vs <span style={{ color: "#9333EA" }}>client</span> (billed to / bought for a specific client, kept out of agency expenses).</li>
                      <li style={li}><b>Salary link</b> — tags an expense as a worker's salary so it syncs into that worker's paid total.</li>
                    </ul>
                  </Section>

                  <Section title="Payment accounts">
                    <div style={sub}>Each account has a turnover limit. The bar shows used vs limit; over-limit pulses red.</div>
                    <code style={code}>account budget = agency REV − expenses − transfers out + transfers in</code>
                    <div style={{ ...sub, marginTop: 8 }}>Only confirmed transactions contribute to turnover.</div>
                  </Section>

                  <Section title="Personal accounts & investments">
                    <div style={sub}>Any account name that is neither an agency account nor a worker is treated as a founder's personal account. When a deal lands on a personal account, the full payment arrives there, but salaries and cost/tax are paid out from it — so only the budget portion should remain:</div>
                    <code style={code}>personal balance = received − salaries − cost/tax − expenses{"\n"}            ( = agency REV − expenses )</code>
                    <div style={{ ...sub, marginTop: 8 }}>Expenses paid from personal accounts are auto-pulled into the founder investments table (marked <span style={accent}>auto</span>).</div>
                  </Section>

                  <Section title="Salaries">
                    <div style={sub}>Salaries are assigned per transaction in each worker's column. Each cell supports an <b>advance</b> deduction (net = amount − advance) and a paid checkbox. The floating reminder lists workers with unpaid salary for the month; which workers it watches is customizable in Settings.</div>
                  </Section>

                  <Section title="Carryover & journal">
                    <ul style={{ paddingLeft: 18 }}>
                      <li style={li}><b>Carryover</b> — the agency budget rolls into the next month as its opening balance, so the budget accumulates over time.</li>
                      <li style={li}><b>Journal</b> — every add / delete / edit / salary action is logged locally with date & time for an audit trail.</li>
                    </ul>
                  </Section>

                  <Section title="Changelog">
                    <ul style={{ paddingLeft: 18 }}>
                      <li style={li}>Sidebar navigation, dark unified theme, full English UI.</li>
                      <li style={li}>Dashboard with annual summary + monthly margin chart.</li>
                      <li style={li}>Confirmed-only statistics across turnover, REV, products & accounts.</li>
                      <li style={li}>Client cost tagging with client name.</li>
                      <li style={li}>Team profiles, customizable salary reminders, action journal.</li>
                      <li style={li}>Corrected personal-account balance (salaries + cost/tax deducted).</li>
                      <li style={li}>Account reconciliation tickets + predictive system checks (anomaly detection).</li>
                    </ul>
                  </Section>

                  <Section title="Reconciliation & system checks">
                    <div style={sub}>The system value of an account (System balance = agency REV − expenses − transfers) can drift from the real balance because of mixed payment accounts, varying fees and untracked edge cases. To stay accurate:</div>
                    <ul style={{ marginTop: 8, paddingLeft: 18 }}>
                      <li style={li}><b style={accent}>Reconcile</b> — on any account card, enter the real balance. The system logs a ticket with the system value, the real value, the delta and an optional note. The original system value is always still shown, so a reconciliation never overwrites it — it sits alongside as the verified figure.</li>
                      <li style={li}><b style={accent}>History</b> — every reconciliation is kept (date, time, delta, note) and viewable per account, plus mirrored in the Journal.</li>
                      <li style={li}><b style={accent}>System checks</b> — a predictive panel (Dashboard + Accounts) flags cases that usually cause mismatch: unbalanced rows, received deals with no account or no REV, expenses with no account, over-limit accounts, oversized transfer fees, and reconciliation drift. Higher-risk items are marked ATTENTION.</li>
                    </ul>
                  </Section>
                </div>
              );
            })()}

          </div>
          </div>

          {/* MODAL: Add Worker */}
          {showAddWorker && (<div className="modal-overlay" onClick={() => setShowAddWorker(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Add team member</h3>
            <label>Name<input value={newWorker.name} onChange={e => setNewWorker({ ...newWorker, name: e.target.value })} placeholder="Name" autoFocus /></label>
            <label>Role<input value={newWorker.role} onChange={e => setNewWorker({ ...newWorker, role: e.target.value })} placeholder="Position" /></label>
            <label>Color<div style={{ display: "flex", gap: 8, marginTop: 6 }}>{WORKER_COLORS.map((c, i) => (<div key={i} onClick={() => setNewWorker({ ...newWorker, colorIdx: i })} style={{ width: 32, height: 32, borderRadius: 6, background: c.bg, cursor: "pointer", border: newWorker.colorIdx === i ? `3px solid ${c.text}` : `1px solid ${c.text}55` }} />))}</div></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowAddWorker(false)}>Cancel</button><button className="btn btn-primary" onClick={addWorker}>Add</button></div>
          </div></div>)}

          {/* MODAL: Add/Edit Expense */}
          {showAddExpense && (<div className="modal-overlay" onClick={() => { setShowAddExpense(false); setEditExpense(null); }}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editExpense ? "Edit expense" : "Add expense"}</h3>
            <label>Service<input value={newExpense.service} onChange={e => setNewExpense({ ...newExpense, service: e.target.value })} placeholder="Service name" autoFocus /></label>
            <label>Account<input list="accounts-list" value={newExpense.persona} onChange={e => setNewExpense({ ...newExpense, persona: e.target.value })} style={{ marginTop: 4 }} placeholder="Pay from" /></label>
            <label>Payment method<select value={newExpense.method} onChange={e => setNewExpense({ ...newExpense, method: e.target.value })}><option>USDT</option><option>USD</option><option>EUR</option><option>UAH</option><option>Card</option></select></label>
            <label>Date<input value={newExpense.date} onChange={e => setNewExpense({ ...newExpense, date: e.target.value })} placeholder="DD.MM" /></label>
            <label>Amount ($)<input type="number" value={newExpense.cost} onChange={e => setNewExpense({ ...newExpense, cost: parseFloat(e.target.value) || 0 })} /></label>
            <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
              <input type="checkbox" checked={newExpense.recurring} onChange={e => setNewExpense({ ...newExpense, recurring: e.target.checked })} style={{ width: 15, height: 15, marginTop: 0 }} />
              Recurring (monthly)
            </label>
            <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
              <input type="checkbox" checked={newExpense.costType === 'client'} onChange={e => setNewExpense({ ...newExpense, costType: e.target.checked ? 'client' : '' })} style={{ width: 15, height: 15, marginTop: 0 }} />
              Client cost (not agency)
            </label>
            {newExpense.costType === 'client' && (
              <label>For which client
                <ClientPickerInput
                  value={newExpense.clientName || ""}
                  onChange={v => setNewExpense({ ...newExpense, clientName: v })}
                  clients={clientNames}
                  placeholder="Search or type client name..."
                />
              </label>
            )}
            <label>Salary for (sync with worker)
              <select value={newExpense.workerLink} onChange={e => setNewExpense({ ...newExpense, workerLink: e.target.value })} style={{ marginTop: 4 }}>
                <option value="">— not salary —</option>
                {workers.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
              </select>
            </label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => { setShowAddExpense(false); setEditExpense(null); }}>Cancel</button><button className="btn btn-primary" onClick={addExpense}>{editExpense ? "Save" : "Add"}</button></div>
          </div></div>)}

          {/* MODAL: Add Transfer */}
          {showTransfer && (<div className="modal-overlay" onClick={() => setShowTransfer(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Transfer between accounts</h3>
            <label>Sender (From)<input list="accounts-list" value={newTransfer.fromAcc} onChange={e => setNewTransfer({ ...newTransfer, fromAcc: e.target.value })} placeholder="Select or type..." autoFocus /></label>
            <label>Recipient (To)<input list="accounts-list" value={newTransfer.toAcc} onChange={e => setNewTransfer({ ...newTransfer, toAcc: e.target.value })} placeholder="Select or type..." /></label>
            <label>Amount ($)<input type="number" value={newTransfer.amount} onChange={e => setNewTransfer({ ...newTransfer, amount: parseFloat(e.target.value) || 0 })} /></label>
            <label>Transfer fee ($)<input type="number" value={newTransfer.fee} onChange={e => setNewTransfer({ ...newTransfer, fee: parseFloat(e.target.value) || 0 })} /></label>
            <label>Date<input value={newTransfer.date} onChange={e => setNewTransfer({ ...newTransfer, date: e.target.value })} placeholder="DD.MM" /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowTransfer(false)}>Cancel</button><button className="btn btn-primary" onClick={addTransfer}>Add</button></div>
          </div></div>)}

          {/* MODAL: Reconcile account */}
          {reconcileAccount && (() => {
            const actual = parseNum(reconcileForm.actual);
            const delta = actual - reconcileAccount.computed;
            return (
              <div className="modal-overlay" onClick={() => setReconcileAccount(null)}><div className="modal" onClick={e => e.stopPropagation()}>
                <h3>Reconcile — {reconcileAccount.name}</h3>
                <p style={{ fontSize: 12, color: "#9a9a9a", marginBottom: 16 }}>Enter the real balance currently on this account. The difference vs the system value is logged so you keep a history and know how far the books drifted.</p>
                <div style={{ background: "#222", borderRadius: 8, padding: "12px 14px", marginBottom: 18 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}><span style={{ color: "#9a9a9a" }}>System balance</span><span style={{ fontFamily: "'JetBrains Mono',monospace", color: "#E5E5E5" }}>{fmt(reconcileAccount.computed)}</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 6 }}><span style={{ color: "#9a9a9a" }}>Real balance</span><span style={{ fontFamily: "'JetBrains Mono',monospace", color: "#E5E5E5" }}>{fmt(actual)}</span></div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginTop: 8, paddingTop: 8, borderTop: "1px solid #333", fontWeight: 700 }}><span style={{ color: "#9a9a9a" }}>Difference</span><span style={{ fontFamily: "'JetBrains Mono',monospace", color: Math.abs(delta) < 0.01 ? "#4ADE80" : delta < 0 ? "#F87171" : "#FBBF24" }}>{delta > 0 ? "+" : ""}{fmt(delta)}</span></div>
                </div>
                <label>Real balance ($)<input type="number" value={reconcileForm.actual} onChange={e => setReconcileForm({ ...reconcileForm, actual: e.target.value })} autoFocus /></label>
                <label>Note — what was off / why? (optional)<textarea value={reconcileForm.note} onChange={e => setReconcileForm({ ...reconcileForm, note: e.target.value })} placeholder="e.g. missing FX fee on a transfer, untracked card charge..." style={{ resize: "vertical", minHeight: 56 }} /></label>
                <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setReconcileAccount(null)}>Cancel</button><button className="btn btn-primary" onClick={submitReconcile}>Save reconciliation</button></div>
              </div></div>
            );
          })()}

          {/* MODAL: Add Account */}
          {showAddAccount && (<div className="modal-overlay" onClick={() => setShowAddAccount(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editAccount ? "Edit account" : "Add account"}</h3>
            <label>Name<input value={newAccountForm.name} onChange={e => setNewAccountForm({ ...newAccountForm, name: e.target.value })} placeholder="Account name" autoFocus /></label>
            <label>Owner<input value={newAccountForm.owner} onChange={e => setNewAccountForm({ ...newAccountForm, owner: e.target.value })} placeholder="Owner" /></label>
            <label>Turnover limit ($)<input type="number" value={newAccountForm.limit} onChange={e => setNewAccountForm({ ...newAccountForm, limit: parseFloat(e.target.value) || 0 })} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowAddAccount(false)}>Cancel</button><button className="btn btn-primary" onClick={submitAccountForm}>{editAccount ? "Save" : "Add"}</button></div>
          </div></div>)}

          {/* MODAL: Add Investment */}
          {showAddProduct && (<div className="modal-overlay" onClick={() => { setShowAddProduct(false); setEditProduct(null); }}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editProduct ? "Edit product" : "New product"}</h3>
            <label>Name<input value={newProduct.name} onChange={e => setNewProduct({ ...newProduct, name: e.target.value })} placeholder="Mentorship, Media Buying..." autoFocus /></label>
            <label>Avg. ticket ($)<input type="number" value={newProduct.avgPrice} onChange={e => setNewProduct({ ...newProduct, avgPrice: parseFloat(e.target.value) || 0 })} /></label>
            <label style={{ display: "flex", alignItems: "center", gap: 10 }}>Color<input type="color" value={newProduct.color} onChange={e => setNewProduct({ ...newProduct, color: e.target.value })} style={{ width: 48, height: 34, padding: 2, border: "1.5px solid #333", borderRadius: 6, cursor: "pointer", marginTop: 4 }} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => { setShowAddProduct(false); setEditProduct(null); }}>Cancel</button><button className="btn btn-primary" onClick={addProduct}>{editProduct ? "Save" : "Add"}</button></div>
          </div></div>)}

          {/* SALARY REMINDER — floating bottom-right */}
          {(() => {
            const watchedWorkers = salaryNotifyWorkerIds !== null ? workers.filter(w => salaryNotifyWorkerIds.includes(w.id)) : workers;
            const unpaid = watchedWorkers.filter(w => transactions.some(t => { const wp = t.workerPay?.[w.id]; return wp && parseNum(wp.amount) > 0 && !wp.paid; }));
            const allPaid = unpaid.length === 0;
            const dismissed = salaryDismissed === monthKey;
            if (allPaid || dismissed) return null;
            return (
              <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 2000, background: "#1A1A1A", color: "#fff", borderRadius: 12, padding: "14px 18px", boxShadow: "0 8px 32px rgba(0,0,0,.4)", maxWidth: 290, border: "1px solid rgba(255,200,50,.3)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#FBBF24", display: "flex", alignItems: "center", gap: 6 }}><Icon name="bell" size={14} /> Salary reminder</div>
                  <button onClick={() => setShowSalarySettings(true)} title="Notification settings" style={{ border: "none", background: "rgba(255,255,255,.1)", borderRadius: 4, cursor: "pointer", color: "#ccc", padding: "4px 6px", lineHeight: 1, display: "inline-flex" }}><Icon name="settings" size={14} /></button>
                </div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,.7)", marginBottom: 10 }}>
                  Unpaid: {unpaid.map(w => w.name).join(", ")}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { setSalaryDismissed(monthKey); localStorage.setItem('salary_dismissed', monthKey); }} style={{ flex: 1, padding: "6px 10px", background: "rgba(255,255,255,.1)", border: "none", borderRadius: 6, color: "#fff", cursor: "pointer", fontSize: 11 }}>Close</button>
                  <button onClick={() => { setSalaryDismissed('all_paid_' + monthKey); localStorage.setItem('salary_dismissed', 'all_paid_' + monthKey); }} style={{ flex: 1, padding: "6px 10px", background: "#4ADE80", border: "none", borderRadius: 6, color: "#166534", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>✓ Salaries paid</button>
                </div>
              </div>
            );
          })()}

          {/* MODAL: Action Log */}
          {showActionLog && (
            <div className="modal-overlay" onClick={() => setShowActionLog(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 580, maxHeight: "80vh", overflowY: "auto" }}>
                <h3>Action journal</h3>
                <input placeholder="Filter by date or action..." value={actionLogFilter} onChange={e => setActionLogFilter(e.target.value)} style={{ width: "100%", padding: "8px 10px", marginBottom: 14, border: "1px solid #333", borderRadius: 6, boxSizing: "border-box", fontSize: 13 }} />
                {(() => {
                  const log = (() => { try { return JSON.parse(localStorage.getItem('adv_action_log') || '[]'); } catch(e) { return []; } })();
                  const filtered = actionLogFilter ? log.filter(e => e.action.toLowerCase().includes(actionLogFilter.toLowerCase()) || new Date(e.ts).toLocaleDateString('uk-UA').includes(actionLogFilter) || (e.detail || '').toLowerCase().includes(actionLogFilter.toLowerCase())) : log;
                  if (filtered.length === 0) return <div style={{ textAlign: "center", color: "#aaa", padding: 24 }}>No records</div>;
                  const grouped = {};
                  filtered.forEach(entry => {
                    const day = new Date(entry.ts).toLocaleDateString('uk-UA', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
                    if (!grouped[day]) grouped[day] = [];
                    grouped[day].push(entry);
                  });
                  return Object.entries(grouped).map(([day, entries]) => (
                    <div key={day} style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 6, paddingBottom: 4, borderBottom: "1px solid #2a2a2a" }}>{day}</div>
                      {entries.map(entry => (
                        <div key={entry.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "5px 0", borderBottom: "1px solid #202020" }}>
                          <span style={{ fontSize: 11, color: "#aaa", fontFamily: "'JetBrains Mono',monospace", whiteSpace: "nowrap" }}>{new Date(entry.ts).toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' })}</span>
                          <span style={{ fontSize: 13, flex: 1 }}>{entry.action}</span>
                          {entry.detail && <span style={{ fontSize: 11, color: "#888", maxWidth: 180, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{entry.detail}</span>}
                          <span style={{ fontSize: 10, color: "#ccc", whiteSpace: "nowrap" }}>{entry.month}</span>
                        </div>
                      ))}
                    </div>
                  ));
                })()}
                <div style={{ display: "flex", gap: 10, marginTop: 16, justifyContent: "space-between" }}>
                  <button className="btn btn-secondary" style={{ fontSize: 12, color: "#DC2626" }} onClick={() => { if(window.confirm("Clear the entire journal?")) { localStorage.removeItem('adv_action_log'); setActionLogFilter(''); } }}>Clear log</button>
                  <button className="btn btn-primary" onClick={() => setShowActionLog(false)}>Close</button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL: Salary Notification Settings */}
          {showSalarySettings && (
            <div className="modal-overlay" onClick={() => setShowSalarySettings(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 380 }}>
                <h3>Salary reminders</h3>
                <p style={{ fontSize: 12, color: "#9a9a9a", marginBottom: 14 }}>Choose which workers to include in reminders. Default — all.</p>
                {workers.map(w => {
                  const c = wc(w);
                  const included = salaryNotifyWorkerIds === null || salaryNotifyWorkerIds.includes(w.id);
                  return (
                    <label key={w.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 8px", borderRadius: 6, cursor: "pointer", background: included ? c.bgLight : "#222", marginBottom: 4, border: `1px solid ${included ? c.border : "#2a2a2a"}` }}>
                      <input type="checkbox" checked={included} onChange={ev => {
                        const current = salaryNotifyWorkerIds || workers.map(ww => ww.id);
                        const updated = ev.target.checked ? [...current, w.id] : current.filter(id => id !== w.id);
                        setSalaryNotifyWorkerIds(updated);
                        localStorage.setItem('salary_notify_workers', JSON.stringify(updated));
                      }} style={{ accentColor: c.border }} />
                      <span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{w.name}</span>
                      {w.role && <span style={{ fontSize: 11, color: "#888" }}>{w.role}</span>}
                    </label>
                  );
                })}
                <div style={{ display: "flex", gap: 10, marginTop: 16, justifyContent: "space-between" }}>
                  <button className="btn btn-secondary" style={{ fontSize: 12 }} onClick={() => { setSalaryNotifyWorkerIds(null); localStorage.removeItem('salary_notify_workers'); }}>↺ Reset (all)</button>
                  <button className="btn btn-primary" onClick={() => setShowSalarySettings(false)}>Done</button>
                </div>
              </div>
            </div>
          )}

          {showAddInvestment && (<div className="modal-overlay" onClick={() => setShowAddInvestment(false)}><div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Add investment</h3>
            <label>Founder<input value={newInvestment.person} onChange={e => setNewInvestment({ ...newInvestment, person: e.target.value })} placeholder="Founder name" autoFocus /></label>
            <label>Amount ($)<input type="number" value={newInvestment.amount} onChange={e => setNewInvestment({ ...newInvestment, amount: parseFloat(e.target.value) || 0 })} /></label>
            <label>Method<select value={newInvestment.method} onChange={e => setNewInvestment({ ...newInvestment, method: e.target.value })}><option>USD</option><option>USDT</option><option>EUR</option><option>PLN</option><option>Card</option></select></label>
            <label>Date<input value={newInvestment.date} onChange={e => setNewInvestment({ ...newInvestment, date: e.target.value })} placeholder="DD.MM" /></label>
            <label>Comment<textarea value={newInvestment.comment} onChange={e => setNewInvestment({ ...newInvestment, comment: e.target.value })} placeholder="Investment details..." style={{ resize: "vertical", minHeight: 60 }} /></label>
            <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}><button className="btn btn-secondary" onClick={() => setShowAddInvestment(false)}>Cancel</button><button className="btn btn-primary" onClick={addInvestment}>Add</button></div>
          </div></div>)}
        </div>
      );
    };

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });

        const {
          data: { subscription },
        } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => subscription.unsubscribe();
      }, []);

      if (loading) return <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontFamily: "'DM Sans', sans-serif" }}><h2>Security check...</h2></div>;

      return session ? <Dashboard userEmail={session.user.email} onLogout={() => supabase.auth.signOut()} /> : <LoginScreen />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
